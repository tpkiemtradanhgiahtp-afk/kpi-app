<style>
@import url('https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@300;400;500;600;700;800;900&display=swap');
:root{--bg:#EDF2F7;--bg2:#FFFFFF;--card:#FFFFFF;--card2:#F7FAFC;--inp:#F0F5FA;--brd:#CBD5E1;--brd2:#94A3B8;--ac:#2563EB;--acg:rgba(37,99,235,.1);--ok:#059669;--okb:rgba(5,150,105,.1);--wn:#D97706;--wnb:rgba(217,119,6,.1);--ng:#DC2626;--ngb:rgba(220,38,38,.1);--t1:#1E293B;--t2:#475569;--t3:#94A3B8;--gold:#D97706;--purple:#7C3AED;--cyan:#0891B2}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Be Vietnam Pro',sans-serif;background:var(--bg);color:var(--t1);min-height:100vh}
.lw{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#E0F2FE,#DBEAFE,#EDE9FE);position:relative;overflow:hidden}
.lw::before{content:'';position:absolute;width:600px;height:600px;background:radial-gradient(circle,rgba(37,99,235,.12),transparent 70%);top:-200px;right:-100px}
.lb{background:#FFFFFF;border:1px solid #CBD5E1;border-radius:20px;padding:44px 36px;width:500px;position:relative;z-index:1;box-shadow:0 25px 60px rgba(30,41,59,.12)}
.lb .la{text-align:center;margin-bottom:28px}.lb .li{width:60px;height:60px;background:linear-gradient(135deg,var(--ac),var(--purple));border-radius:14px;display:inline-flex;align-items:center;justify-content:center;font-size:26px;color:#fff;margin-bottom:12px}
.lb h1{font-size:22px;font-weight:700}.lb .sub{font-size:14px;color:var(--t2)}
.le{color:var(--ng);font-size:13px;margin-top:7px;display:none}
.app{display:none;min-height:100vh}.app.on{display:flex}
::-webkit-scrollbar{width:5px;height:5px}::-webkit-scrollbar-track{background:#F1F5F9}::-webkit-scrollbar-thumb{background:#CBD5E1;border-radius:3px}

.sb{width:300px;background:linear-gradient(180deg,#1E3A5F 0%,#1E40AF 100%);border-right:none;display:flex;flex-direction:column;position:fixed;top:0;left:0;bottom:0;z-index:100;overflow-y:auto}
.sb-h{padding:18px 20px;border-bottom:1px solid rgba(255,255,255,.15)}.sb-h .br{display:flex;align-items:center;gap:10px}
.sb-h .bi{width:40px;height:40px;background:linear-gradient(135deg,var(--ac),var(--purple));border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;color:#fff;flex-shrink:0}
.sb-h .bt h2{font-size:15px;font-weight:700;color:#fff}.sb-h .bt span{font-size:12px;color:rgba(255,255,255,.7)}
.ns{margin-bottom:6px}.nst{font-size:13px;font-weight:800;text-transform:uppercase;letter-spacing:1px;color:rgba(255,255,255,.5);padding:14px 16px 6px;display:flex;align-items:center;gap:8px}
.nst i{font-size:12px}
.ni{display:flex;align-items:center;gap:10px;padding:10px 16px;color:rgba(255,255,255,.75);cursor:pointer;transition:all .15s;font-size:15px;font-weight:500;border-left:3px solid transparent}
.ni:hover{background:rgba(255,255,255,.1);color:#fff}.ni.on{background:rgba(255,255,255,.15);color:#fff;border-left-color:#FBBF24}.ni i{width:18px;text-align:center;font-size:14px}

.mn{margin-left:300px;flex:1;min-height:100vh}
.tp{height:64px;background:#FFFFFF;border-bottom:1px solid #E2E8F0;display:flex;align-items:center;justify-content:space-between;padding:0 28px;position:sticky;top:0;z-index:50}
.tp h1{font-size:20px;font-weight:700}.tp-a{display:flex;align-items:center;gap:10px}
.ms{display:flex;align-items:center;gap:6px;background:var(--card);border:1px solid var(--brd);border-radius:8px;padding:6px 12px}
.ms select{background:transparent;border:none;color:var(--t1);font-family:inherit;font-size:14px;font-weight:500;cursor:pointer}.ms select:focus{outline:none}
.ct{padding:24px 28px}

.fg{margin-bottom:16px}.fg label{display:block;font-size:13px;font-weight:700;color:var(--t3);margin-bottom:6px;text-transform:uppercase;letter-spacing:.5px}
.fg input,.fg select,.fg textarea{width:100%;padding:12px 14px;background:var(--inp);border:1px solid var(--brd);border-radius:8px;color:var(--t1);font-size:15px;font-family:inherit;transition:all .2s}
.fg input:focus,.fg select:focus,.fg textarea:focus{outline:none;border-color:var(--ac);box-shadow:0 0 0 3px var(--acg)}

.btn{padding:10px 20px;border:none;border-radius:8px;font-family:inherit;font-size:14px;font-weight:600;cursor:pointer;transition:all .2s;display:inline-flex;align-items:center;gap:7px}
.btn-p{background:linear-gradient(135deg,var(--ac),#4f46e5);color:#fff}.btn-p:hover{box-shadow:0 6px 20px rgba(59,130,246,.3)}
.btn-s{padding:8px 14px;font-size:13px;border-radius:7px}.btn-x{padding:6px 10px;font-size:12px;border-radius:6px}
.btn-o{background:transparent;border:1px solid var(--brd);color:var(--t2)}.btn-o:hover{border-color:var(--ac);color:var(--ac)}
.btn-ok{background:var(--ok);color:#fff}.btn-ng{background:var(--ng);color:#fff}.btn-wn{background:var(--wn);color:#000}

.sg{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:24px}
.sc{background:var(--card);border:1px solid var(--brd);border-radius:12px;padding:18px;transition:all .2s;cursor:pointer;box-shadow:0 1px 3px rgba(0,0,0,.06)}.sc:hover{border-color:var(--brd2);transform:translateY(-2px)}
.si{width:42px;height:42px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;margin-bottom:10px}
.si.bl{background:rgba(59,130,246,.12);color:var(--ac)}.si.gn{background:var(--okb);color:var(--ok)}.si.yl{background:var(--wnb);color:var(--wn)}.si.rd{background:var(--ngb);color:var(--ng)}.si.pp{background:rgba(139,92,246,.12);color:var(--purple)}
.sv{font-size:30px;font-weight:800;letter-spacing:-1px}.sl{font-size:13px;color:var(--t2);margin-top:3px}

.cd{background:var(--card);border:1px solid var(--brd);border-radius:12px;margin-bottom:16px;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.ch{padding:14px 20px;border-bottom:1px solid var(--brd);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px}
.ch h3{font-size:16px;font-weight:700;display:flex;align-items:center;gap:8px}
.cb{padding:16px 20px}.cb.np{padding:0}
table{width:100%;border-collapse:collapse}
th{text-align:left;padding:10px 14px;font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--t3);background:var(--inp);border-bottom:1px solid var(--brd);white-space:nowrap}
td{padding:10px 14px;font-size:14px;border-bottom:1px solid var(--brd);vertical-align:middle}
tr:last-child td{border-bottom:none}tr:hover td{background:rgba(59,130,246,.02)}
.badge{padding:3px 10px;border-radius:5px;font-size:12px;font-weight:600;display:inline-block;white-space:nowrap}
.badge.ok{background:var(--okb);color:var(--ok)}.badge.ng{background:var(--ngb);color:var(--ng)}.badge.wn{background:var(--wnb);color:var(--wn)}.badge.bl{background:rgba(59,130,246,.12);color:var(--ac)}.badge.pp{background:rgba(139,92,246,.12);color:var(--purple)}
.pb{width:100%;height:5px;background:var(--inp);border-radius:3px;overflow:hidden}.pb .fl{height:100%;border-radius:3px;transition:width .3s}

.mo{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(30,41,59,.4);z-index:200;align-items:center;justify-content:center;backdrop-filter:blur(4px)}
.mo.on{display:flex}.ml{background:var(--card);border:1px solid var(--brd);border-radius:14px;width:900px;max-width:94vw;max-height:90vh;overflow:hidden;display:flex;flex-direction:column}
.mh{padding:18px 22px;border-bottom:1px solid var(--brd);display:flex;align-items:center;justify-content:space-between}
.mh h3{font-size:18px;font-weight:700}.mc{background:none;border:none;color:var(--t3);font-size:18px;cursor:pointer}.mc:hover{color:var(--t1)}
.mb{padding:22px;overflow-y:auto;flex:1}.mf{padding:14px 22px;border-top:1px solid var(--brd);display:flex;justify-content:flex-end;gap:8px}

.tabs{display:flex;gap:3px;margin-bottom:16px;background:var(--inp);padding:3px;border-radius:8px;flex-wrap:wrap}
.tab{padding:8px 16px;border-radius:7px;font-size:13px;font-weight:600;color:var(--t2);cursor:pointer;transition:all .15s;border:none;background:none;font-family:inherit}
.tab.on{background:var(--ac);color:#fff}.tab:hover:not(.on){color:var(--t1)}

.uc{background:var(--card);border:1px solid var(--brd);border-radius:12px;margin-bottom:12px;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.uh{padding:14px 18px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;transition:background .15s}
.uh:hover{background:var(--card2)}.uh .inf{display:flex;align-items:center;gap:10px}
.uh .ico{width:36px;height:36px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0}
.uh .nm{font-size:15px;font-weight:600}.uh .mt{font-size:12px;color:var(--t3)}
.ubody{display:none;border-top:1px solid var(--brd)}.ubody.exp{display:block}

.dbox{background:linear-gradient(135deg,rgba(37,99,235,.06),rgba(124,58,237,.06));border:1px solid rgba(37,99,235,.2);border-radius:10px;padding:14px 18px;margin-bottom:14px}
.dbox h4{font-size:14px;font-weight:700;color:var(--ac);margin-bottom:6px;display:flex;align-items:center;gap:6px}
.dbox p{font-size:14px;color:var(--t2);line-height:1.6;white-space:pre-wrap}

.ie{background:transparent;border:1px solid transparent;color:var(--t1);font-family:inherit;font-size:14px;padding:4px 6px;border-radius:4px;width:70px;text-align:center}
.ie:focus{background:var(--inp);border-color:var(--ac);outline:none}.ie:hover{border-color:var(--brd)}.ie.w{width:100%;text-align:left}
.ck{width:16px;height:16px;accent-color:var(--ok);cursor:pointer}

.bc{display:flex;align-items:center;gap:6px;margin-bottom:16px;font-size:14px;color:var(--t3)}
.bc a{color:var(--ac);cursor:pointer;text-decoration:none}.bc a:hover{text-decoration:underline}

.srow{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:16px}
.sbox{background:var(--inp);border:1px solid var(--brd);border-radius:10px;padding:14px;text-align:center}
.sbox .v{font-size:24px;font-weight:800}.sbox .l{font-size:11px;color:var(--t3);margin-top:4px}

.empty{text-align:center;padding:36px 16px;color:var(--t3)}.empty i{font-size:36px;margin-bottom:12px;display:block}.empty p{font-size:15px}
.tC{position:fixed;top:16px;right:16px;z-index:999}
/* Nút đồng bộ nổi */
#btnSyncNow{position:fixed;bottom:24px;right:24px;z-index:998;background:linear-gradient(135deg,var(--ac),var(--purple));color:#fff;border:none;border-radius:50px;padding:12px 20px;font-size:14px;font-weight:700;cursor:pointer;box-shadow:0 4px 16px rgba(37,99,235,.35);display:none;align-items:center;gap:8px;transition:all .2s;font-family:inherit}
#btnSyncNow:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(37,99,235,.45)}
#btnSyncNow.has-change{display:flex;animation:pulse-sync 2s infinite}
#btnSyncNow .dot{width:8px;height:8px;background:#fbbf24;border-radius:50%;flex-shrink:0}
@keyframes pulse-sync{0%,100%{box-shadow:0 4px 16px rgba(37,99,235,.35)}50%{box-shadow:0 4px 24px rgba(37,99,235,.7)}}
.toast{background:#FFFFFF;border:1px solid #E2E8F0;border-radius:8px;padding:12px 16px;margin-bottom:6px;display:flex;align-items:center;gap:8px;font-size:14px;box-shadow:0 8px 30px rgba(30,41,59,.12);min-width:240px;animation:fi .25s}
.toast.ok{border-left:3px solid var(--ok)}.toast.ng{border-left:3px solid var(--ng)}.toast.bl{border-left:3px solid var(--ac)}

.daily-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(54px,1fr));gap:4px;margin-top:8px}
.day-cell{text-align:center;padding:4px 2px;background:var(--inp);border:1px solid var(--brd);border-radius:5px}
.day-cell.has{background:rgba(5,150,105,.08);border-color:rgba(5,150,105,.3)}.day-cell.today{border-color:var(--ac);box-shadow:0 0 0 2px var(--ac);background:#EFF6FF}
.day-cell input{width:100%;background:transparent;border:none;color:var(--t1);font-family:inherit;font-size:13px;text-align:center;padding:2px}
.day-cell input:focus{outline:none}.day-cell .dl{color:var(--t3);font-size:10px}
.day-cell.future{opacity:.4}
.score-bar{display:flex;align-items:center;gap:8px;margin-top:8px}
.score-bar .expected{height:4px;background:var(--brd);border-radius:2px;flex:1;position:relative}
.score-bar .expected .actual{height:100%;border-radius:2px;position:absolute;left:0;top:0}
.score-bar .expected .marker{position:absolute;top:-5px;width:2px;height:14px;background:var(--wn);border-radius:1px}

.member-chips{display:flex;flex-wrap:wrap;gap:5px;margin-top:6px}
.member-chip{display:inline-flex;align-items:center;gap:4px;padding:4px 10px;background:var(--acg);border:1px solid var(--ac);border-radius:5px;font-size:13px;color:var(--ac)}

.weight-label{font-size:11px;padding:2px 8px;border-radius:4px;font-weight:700}
.w50{background:rgba(59,130,246,.1);color:var(--ac)}.w0{background:rgba(100,116,139,.1);color:var(--t3)}

.meeting-card{background:var(--card);border:1px solid var(--brd);border-radius:12px;padding:18px;margin-bottom:10px;transition:all .2s;cursor:pointer;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.meeting-card:hover{border-color:var(--ac);transform:translateY(-1px)}

@keyframes fi{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}.fi{animation:fi .25s ease}
@media(max-width:1100px){.sg{grid-template-columns:repeat(2,1fr)}}
@media(max-width:768px){.sb{transform:translateX(-100%);transition:transform .3s}.sb.open{transform:translateX(0)}.mn{margin-left:0}.sg{grid-template-columns:1fr}}
@media print{.sb,.tp,.btn{display:none!important}.mn{margin-left:0!important}.cd{break-inside:avoid;border:1px solid #ddd!important}}

.cb-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:8px}
.cb-item{display:flex;align-items:center;gap:8px;padding:10px;background:var(--inp);border:1px solid var(--brd);border-radius:8px;cursor:pointer;transition:all .15s}
.cb-item:hover{border-color:var(--ac)}.cb-item.checked{background:var(--acg);border-color:var(--ac)}
.cb-item input{flex-shrink:0}.cb-item strong{font-size:13px}.cb-item small{font-size:11px;color:var(--t3);display:block}
.cb-score{margin-left:auto;font-size:15px;font-weight:800;color:var(--ac)}

/* Multi-person dropdown */
.ms-wrap{position:relative}
.ms-box{background:var(--inp);border:1px solid var(--brd);border-radius:8px;padding:6px 10px;min-height:36px;cursor:pointer;display:flex;align-items:center;gap:6px;flex-wrap:wrap;font-size:13px;color:var(--t1);user-select:none}
.ms-box:hover{border-color:var(--ac)}
.ms-chip{background:var(--acg);color:var(--ac);border:1px solid var(--ac);border-radius:4px;padding:1px 6px;font-size:11px;white-space:nowrap}
.ms-placeholder{color:var(--t3)}
.ms-dropdown{display:none;position:absolute;top:calc(100% + 4px);left:0;right:0;background:var(--inp);border:1px solid var(--brd);border-radius:8px;box-shadow:0 4px 16px rgba(0,0,0,.12);z-index:999;max-height:180px;overflow-y:auto;padding:4px}
.ms-dropdown.open{display:block}
.ms-item{display:flex;align-items:center;gap:8px;padding:6px 10px;border-radius:6px;cursor:pointer;font-size:13px;transition:background .15s}
.ms-item:hover{background:var(--acg)}
.ms-item input{accent-color:var(--ac);width:14px;height:14px;flex-shrink:0}

</style>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getDatabase, ref, set, update, onValue } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

</script>
</head>
<body>
<div class="lw" id="LS">
  <div class="lb fi">
    <div class="la"><div class="li"><i class="fas fa-chart-line"></i></div><h1>HỆ THỐNG QUẢN TRỊ KPI</h1><div class="sub">Chiến lược & Mục tiêu Tập đoàn</div></div>
    <div class="fg"><label>Username</label><input type="text" id="lU" placeholder="Nhập username" autocomplete="off" name="kpi_fake_u"></div>
    <div class="fg"><label>Mật khẩu</label><input type="text" id="lP" placeholder="Nhập mật khẩu" autocomplete="off" name="kpi_fake_p" style="-webkit-text-security:disc;text-security:disc"></div>
    <div class="le" id="lE"></div>
    <button class="btn btn-p" onclick="doLogin()"><i class="fas fa-sign-in-alt"></i> Đăng nhập</button>
    
  </div>
</div>
<div class="app" id="APP">
<button id="btnSyncNow" onclick="if(window._fbPushNow){window._fbPushNow(false);window._hasLocalChange=false;}else{toast('Chưa bật Firebase Sync','ng')}" title="Lưu & Đồng bộ lên cloud">
  <span class="dot"></span><i class="fas fa-cloud-upload-alt"></i> Lưu & Đồng bộ
</button>
<aside class="sb" id="SB">
  <div class="sb-h"><div class="br"><div class="bi"><i class="fas fa-chart-line"></i></div><div class="bt"><h2>KPI SYSTEM</h2><span>Quản trị Tập đoàn</span></div></div></div>
  <nav id="NAV"></nav>
  <div class="sb-f" style="padding:14px;border-top:1px solid rgba(255,255,255,.15)">
    <select id="userSel" onchange="switchUser(this.value)" style="width:100%;padding:8px 10px;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);border-radius:8px;color:#fff;font-family:inherit;font-size:13px;cursor:pointer"></select>
    <div style="margin-top:4px;text-align:center;font-size:10px;color:rgba(255,255,255,.4)" id="uRl2"></div>
  </div>
</aside>
<main class="mn">
  <div class="tp"><h1 id="PT">Dashboard</h1><div class="tp-a"><button class="btn btn-x btn-o" onclick="openGlobalSearch()" title="Tìm kiếm toàn cục (Ctrl+K)" style="margin-right:4px"><i class="fas fa-search"></i></button><button class="btn btn-x btn-o" onclick="exportPDF()" title="Xuất PDF" style="margin-right:8px"><i class="fas fa-file-pdf"></i></button><div class="ms" style="display:flex;align-items:center;gap:6px">
  <i class="fas fa-calendar-alt" style="color:var(--t3)"></i>
  <select id="MS_M" onchange="setCM()" style="padding:4px 6px;background:transparent;border:none;color:var(--t1);font-family:inherit;font-size:14px;font-weight:500;cursor:pointer;outline:none">
    <option value="01">T1</option><option value="02">T2</option><option value="03">T3</option>

function toggleEye(inputId,iconId){
  const inp=document.getElementById(inputId);const ico=document.getElementById(iconId);

function checkPwdStrength(v){
  const bar=document.getElementById('pwdStrBar');const fill=document.getElementById('pwdStrFill');const txt=document.getElementById('pwdStrTxt');
  if(!bar||!fill||!txt)return;
  if(!v){bar.style.display='none';return}
  bar.style.display='block';
  let score=0;
  if(v.length>=6)score++;if(v.length>=10)score++;
  if(/[A-Z]/.test(v))score++;if(/[0-9]/.test(v))score++;if(/[^A-Za-z0-9]/.test(v))score++;
  const levels=[
    {pct:20,color:'#DC2626',label:'Rất yếu'},
    {pct:40,color:'#D97706',label:'Yếu'},
    {pct:60,color:'#FBBF24',label:'Trung bình'},
    {pct:80,color:'#059669',label:'Mạnh'},
    {pct:100,color:'#2563EB',label:'Rất mạnh'}];
  const lv=levels[Math.min(score,4)];
  fill.style.width=lv.pct+'%';fill.style.background=lv.color;
  txt.textContent=lv.label;txt.style.color=lv.color;
}

function importMembers(){
  if(typeof XLSX==='undefined'){toast('Thư viện Excel chưa tải xong, thử lại!','ng');return}
  const inp=document.createElement('input');inp.type='file';inp.accept='.xlsx,.xls,.csv';
  inp.onchange=e=>{
    const file=e.target.files[0];if(!file)return;
    const reader=new FileReader();
    reader.onload=ev=>{
      try{
        const wb=XLSX.read(ev.target.result,{type:'binary'});
        const ws=wb.Sheets[wb.SheetNames[0]];
        const rows=XLSX.utils.sheet_to_json(ws);
        if(!rows.length){toast('File không có dữ liệu!','ng');return}
        _previewImport(rows);
      }catch(err){toast('Lỗi đọc file: '+err.message,'ng')}
    };
    reader.readAsBinaryString(file);
  };
  inp.click();
}

function _previewImport(rows){
  const roleMap={'Lãnh đạo':'admin','Tổng GĐ':'admin','Phó TGĐ':'admin','T/P Phòng ban':'manager','QL Đơn vị':'leader','Nhân viên':'staff'};
  const parsed=rows.map((r,i)=>{
    const role=r['Role (hệ thống)']||(roleMap[r['Phân quyền']]||'staff');
    const unitId=r['UnitId (hệ thống)']||'';
    const name=(r['Họ tên']||'').trim();
    const username=(r['Username']||'').trim().toLowerCase();
    const password=(r['Mật khẩu']||'123456').toString().trim();
    const position=(r['Chức vụ']||'').trim();
    const existing=D.members.find(m=>m.username===username);
    const status=!name?'Lỗi: thiếu tên':!username?'Lỗi: thiếu username':existing?'Cập nhật':'Thêm mới';
    return{name,username,password,position,role,unitId,status,_idx:i};
  }).filter(r=>r.name&&r.username);

  const ok=parsed.filter(r=>!r.status.startsWith('Lỗi'));
  const err=parsed.filter(r=>r.status.startsWith('Lỗi'));
  document.getElementById('MT').textContent=`Xem trước nhập Excel (${ok.length} dòng hợp lệ)`;
  document.getElementById('MB').innerHTML=`
    ${err.length?`<div style="padding:10px 14px;background:var(--ngb);border:1px solid var(--ng);border-radius:8px;margin-bottom:12px;font-size:13px">
      <i class="fas fa-exclamation-triangle" style="color:var(--ng)"></i> <strong>${err.length} dòng lỗi</strong> sẽ bị bỏ qua: ${err.map(r=>r.username||r.name).join(', ')}
    </div>`:''}
    <div style="max-height:320px;overflow-y:auto">
    <table><thead><tr><th>#</th><th>Họ tên</th><th>Username</th><th>Chức vụ</th><th>Role</th><th>Đơn vị</th><th>Trạng thái</th></tr></thead><tbody>
    ${ok.map((r,i)=>`<tr>
      <td>${i+1}</td><td><strong>${r.name}</strong></td>
      <td style="color:var(--ac)">${r.username}</td>
      <td>${r.position||'-'}</td>
      <td><span class="badge ${r.role==='admin'||r.role==='tgd'||r.role==='ptgd'?'ok':r.role==='manager'?'pp':r.role==='leader'?'wn':'bl'}">${RN[r.role]||r.role}</span></td>
      <td style="font-size:12px">${D.units.find(u=>u.id===r.unitId)?.name||'Ban lãnh đạo'}</td>
      <td><span class="badge ${r.status==='Thêm mới'?'ok':'wn'}">${r.status}</span></td>
    </tr>`).join('')}
    </tbody></table></div>`;
  document.getElementById('MF').innerHTML=`
    <button class="btn btn-s btn-o" onclick="cM()">Hủy</button>
    <button class="btn btn-s btn-p" onclick="_doImport(${JSON.stringify(ok).replace(/"/g,'&quot;')})"><i class="fas fa-file-import"></i> Nhập ${ok.length} thành viên</button>`;
  document.getElementById('MO').classList.add('on');
}

function _doImport(rows){
  let added=0,updated=0;
  rows.forEach(r=>{
    const existing=D.members.find(m=>m.username===r.username);
    if(existing){
      existing.name=r.name;existing.position=r.position;
      existing.role=r.role;existing.unitId=r.unitId;
      if(r.password&&r.password!=='123456')existing.password=r.password;
      updated++;
    }else{
      D.members.push({id:'m_'+Date.now()+'_'+Math.random().toString(36).slice(2,6),
        name:r.name,username:r.username,password:r.password||'123456',
        position:r.position,role:r.role,unitId:r.unitId});
      added++;
    }
  });
  sv();bN();cM();R();
  toast(`Nhập xong! Thêm mới: ${added}, Cập nhật: ${updated}`,'ok');
}

function autoLogin(){
  try{
    const a=JSON.parse(localStorage.getItem(AUTH_KEY));
    if(a&&a.u){
      const m=D.members.find(x=>x.username===a.u);
      if(m){
        if(a.h){
          // [FIX-D] So sánh hash lưu trữ, không so sánh plain password
          hashPwd(m.password).then(function(hashed){
            if(hashed===a.h){U=m;enterApp();}
            else{localStorage.removeItem(AUTH_KEY);}
          });
        }else{U=m;enterApp();} // fallback session cũ
        return true;
      }
    }
  }catch(e){}
  return false;
}

function gCt(uid){if(!D.contacts)D.contacts={};if(!D.contacts[uid])D.contacts[uid]=[];return D.contacts[uid];}
function cumul(daily){return Object.values(daily||{}).reduce((s,v)=>s+(+v||0),0)}

function delDirection(uid,idx){

function kPct(t,d){const c=cumul(d);return t>0?Math.round(c/t*100):0}
function kExp(t,day){const dim=daysInMonth();return t>0&&day>0?Math.round(t/dim*day):0}
function kSt(p){return p>=100?'Đạt':p>=80?'Có thể đạt':'Chưa đạt'}
function kC(p){return p>=100?'ok':p>=80?'wn':'ng'}
function kCol(p){return p>=80?'var(--ok)':p>=50?'var(--wn)':'var(--ng)'}

function uScore(uid) {
  try {
    const ud = gU(uid);
    let totalScore = 0, memberCount = 0;
    memsOf(uid).forEach(mem => {
      const hasKpi = ud.shared.some(sk => sk.members?.[mem.id]?.target > 0)
        || (Array.isArray(ud.personal?.[mem.id]) && ud.personal[mem.id].some(k => k.target > 0));
      if (hasKpi) {
        totalScore += mScore(uid, mem.id);
        memberCount++;
      }
    });
    return memberCount > 0 ? Math.round(totalScore / memberCount) : 0;
  } catch(e) { return 0; }
}
function mScore(uid, mid) {
  try {
    const ud = gU(uid);
    let totalEarned = 0, totalMax = 0;

    // --- KPI Chiến lược Chung ---
    (ud.shared || []).forEach(sk => {
      const md = sk && sk.members ? sk.members[mid] : null;
      if (md && md.target > 0) {
        const scoreMax = sk.score || 0;
        const hasResult = sk.result !== undefined && sk.result !== null && sk.result !== '';
        // Lãnh đạo đã chấm: dùng đúng số điểm tuyệt đối
        const earned = hasResult ? Number(sk.result) : (Math.min(1, kPct(md.target, md.daily) / 100) * scoreMax);
        totalEarned += earned;
        totalMax += scoreMax;
      }
    });

    // --- KPI Cá nhân ---
    const pArr = (ud.personal && ud.personal[mid]) || [];
    if (Array.isArray(pArr)) {
      pArr.forEach(k => {
        if (k && k.target > 0) {
          const scoreMax = k.score || 0;
          const hasResult = k.result !== undefined && k.result !== null && k.result !== '';
          const earned = hasResult ? Number(k.result) : (Math.min(1, kPct(k.target, k.daily) / 100) * scoreMax);
          totalEarned += earned;
          totalMax += scoreMax;
        }
      });
    }

    return totalMax > 0 ? Math.round(totalEarned / totalMax * 100) : 0;
  } catch(e) { return 0; }
}

function dailyGrid(daily,target,onchange,disabled){
  const dim=daysInMonth(),td=today();let h='<div class="daily-grid">';
  for(let d=1;d<=dim;d++){const v=daily?.[d]||'';const cls=(v?'has ':'')+(d===td?'today ':'')+(d>td&&td>0?'future':'');
    h+=`<div class="day-cell ${cls}"><div class="dl">${d}</div><input type="number" value="${v}" min="0" placeholder="·" onchange="${onchange.replace(')',','+d+',this.value)')}" ${disabled?'disabled':''}></div>`}
  h+='</div>';
  const c=cumul(daily);const exp=kExp(target,td);const pct=target>0?Math.min(100,Math.round(c/target*100)):0;
  const expPct=target>0?Math.min(100,Math.round(exp/target*100)):0;
  h+=`<div class="score-bar"><div class="expected"><div class="actual fl" style="width:${pct}%;background:${kCol(pct)}"></div><div class="marker" style="left:${expPct}%"></div></div><span style="font-size:13px;font-weight:700;color:${kCol(pct)};min-width:40px;text-align:right">${c}/${target}</span></div>`;
  if(td>0&&target>0){const gap=exp-c;h+=`<div style="font-size:12px;color:var(--t3);margin-top:4px">Kỳ vọng ngày ${td}: <strong style="color:var(--wn)">${exp}</strong> · Thực tế: <strong style="color:${kCol(pct)}">${c}</strong> · ${gap>0?`<span style="color:var(--ng)">Thiếu ${gap}, bù ~${Math.ceil(gap/(dim-td||1))}/ngày</span>`:`<span style="color:var(--ok)">Vượt tiến độ</span>`}</div>`}
  return h}

function _uSK(uid,si,mid,day,val){
  const sk=gU(uid).shared[si];

}

function _refreshProgress(uid){
  try{

    document.querySelectorAll('[data-prog-uid="'+uid+'"]').forEach(function(el){

        if(md){const p=kPct(md.target,md.daily);el.style.width=Math.min(100,p)+'%';

      }
    });

        options:{responsive:true,cutout:'65%',plugins:{legend:{position:'bottom',labels:{boxWidth:12,padding:12,font:{size:12}}},
          tooltip:{callbacks:{label:ctx=>`${ctx.label}: ${ctx.raw} (${Math.round(ctx.raw/total*100)}%)`}}},
          animation:{animateRotate:true,duration:900}}});
    }

    // === CHART 3: Bar nhân viên ===
    const ctx3=document.getElementById('chartMemBar');
    if(ctx3){
      const colors=['#2563EB','#7C3AED','#059669','#D97706','#DC2626','#0891B2','#10b981','#f59e0b'];
      new Chart(ctx3,{type:'bar',data:{
        labels:memScores.map(m=>m.name),
        datasets:[{label:'Điểm KPI',data:memScores.map(m=>m.score),
          backgroundColor:memScores.map((m,i)=>colors[i%colors.length]+'BB'),
          borderColor:memScores.map((m,i)=>colors[i%colors.length]),
          borderWidth:2,borderRadius:6,borderSkipped:false}]},
        options:{responsive:true,indexAxis:'y',plugins:{legend:{display:false},tooltip:{callbacks:{label:ctx=>`${ctx.raw}%`}}},
          scales:{x:{beginAtZero:true,max:100,ticks:{callback:v=>v+'%'},grid:{color:'rgba(0,0,0,0.05)'}},
            y:{grid:{display:false}}},animation:{duration:700}}});
    }

    // === CHART 4: Line chart trend theo tuần ===
    const ctx4=document.getElementById('chartWeekLine');
    if(ctx4){
      const dim=daysInMonth();const td=today()||dim;
      const weeks=['T1','T2','T3','T4','T5'];
      const wData=D.units.map((u,i)=>{
        const ud=gU(u.id);let vals=[];
        for(let w=0;w<5;w++){const dayEnd=Math.min((w+1)*7,td);
          let sum=0,cnt=0;
          (ud.shared||[]).forEach(sk=>{if(sk.members)Object.values(sk.members).forEach(md=>{
            if(md&&md.target>0){let c2=0;for(let d=1;d<=dayEnd;d++)c2+=(md.daily&&md.daily[d])||0;
            sum+=Math.min(100,md.target>0?Math.round(c2/md.target*100):0);cnt++}})});
          vals.push(cnt>0?Math.round(sum/cnt):0)}
        return{label:u.name.replace('Bán hàng ','').replace('Cửa hàng ','CH '),data:vals,borderColor:u.color,backgroundColor:u.color+'22',fill:false,tension:0.4,borderWidth:2.5,pointRadius:4,pointHoverRadius:6}});
      new Chart(ctx4,{type:'line',data:{labels:weeks,datasets:wData},
        options:{responsive:true,plugins:{legend:{position:'bottom',labels:{boxWidth:10,padding:8,font:{size:11}}}},
          scales:{y:{beginAtZero:true,max:100,ticks:{callback:v=>v+'%'},grid:{color:'rgba(0,0,0,0.05)'}},
            x:{grid:{color:'rgba(0,0,0,0.03)'}}},animation:{duration:1000}}});
    }

    // === CHART 5: Bar tiêu chí HW/SW ===
    const ctx5=document.getElementById('chartCriteriaBar');
    if(ctx5){
      const bankByType={hw:hwC,sw:swC};
      new Chart(ctx5,{type:'bar',data:{
        labels:['Cơ sở vật chất (HW)','Vận hành (SW)'],
        datasets:[{label:'Số tiêu chí',data:[hwC,swC],
          backgroundColor:['#2563EBCC','#7C3AEDCC'],borderColor:['#2563EB','#7C3AED'],
          borderWidth:2,borderRadius:10,borderSkipped:false}]},
        options:{responsive:true,plugins:{legend:{display:false},tooltip:{callbacks:{label:ctx=>`${ctx.raw} tiêu chí`}}},
          scales:{y:{beginAtZero:true,ticks:{stepSize:1},grid:{color:'rgba(0,0,0,0.05)'}},x:{grid:{display:false}}},
          animation:{duration:700}}});
    }
  },150);
}

function addPK(uid,mid){
  // Open modal form to create new personal KPI with "Gửi KPI" button
  document.getElementById('MT').textContent='Tạo KPI Cá nhân Mới';
  const mem=D.members.find(m=>m.id===mid);

    </div>`:''}
    <div class="fg"><label>TÊN KPI <span style="color:var(--ng)">*</span></label><input type="text" id="pkName" placeholder="Nhập tên KPI cá nhân..." style="font-weight:600"></div>
    <div class="fg"><label>MÔ TẢ CHI TIẾT</label><textarea id="pkDesc" rows="2" placeholder="Mô tả chi tiết KPI..."></textarea></div>

      <div class="fg" style="margin:0"><label>THỜI HẠN</label><input type="date" id="pkDeadline" style="width:100%"></div>
    </div>
    <div id="pkErr" style="color:var(--ng);font-size:13px;display:none;margin-top:4px"></div>
  `;
  document.getElementById('MF').innerHTML=`
    <button class="btn btn-s btn-o" onclick="cMH()">Huỷ</button>
    <button class="btn btn-s btn-p" onclick="doAddPK('${uid}','${mid}')"><i class="fas fa-paper-plane"></i> Gửi KPI</button>
  `;
  document.getElementById('MO').classList.add('on');
  setTimeout(()=>{const n=document.getElementById('pkName');if(n)n.focus();},100);
}

function doAddPK(uid,mid){
  const name=(document.getElementById('pkName')?.value||'').trim();
  const desc=(document.getElementById('pkDesc')?.value||'').trim();
  const target=Number(document.getElementById('pkTarget')?.value||0);
  const score=Number(document.getElementById('pkScore')?.value||0);
  const deadline=document.getElementById('pkDeadline')?.value||'';
  const errEl=document.getElementById('pkErr');
  if(!name){errEl.textContent='Vui lòng nhập tên KPI.';errEl.style.display='block';return;}
  const ud=gU(uid);
  if(!ud.personal[mid])ud.personal[mid]=[];
  // Kiểm tra tên KPI trùng
  const dupName=ud.personal[mid].find(k=>k.name&&k.name.trim().toLowerCase()===name.toLowerCase());
  if(dupName){errEl.textContent='KPI "'+name+'" đã tồn tại. Vui lòng đặt tên khác.';errEl.style.display='block';return;}
  ud.personal[mid].push({name,desc,target,score,deadline,result:'',daily:{},confirmed:false});
  sv();_exp.add('s'+uid);
  // Disable toàn bộ input & nút Gửi, hiện thông báo thành công trong modal
  const mbEl=document.getElementById('MB');
  if(mbEl){
    mbEl.querySelectorAll('input,textarea,button').forEach(el=>{el.disabled=true;el.style.opacity='0.5';});
    const okBanner=document.createElement('div');
    okBanner.style.cssText='display:flex;align-items:center;gap:8px;padding:10px 14px;background:var(--okb);border:1.5px solid var(--ok);border-radius:8px;margin-top:12px;font-size:13px;font-weight:600;';
    okBanner.innerHTML='<i class="fas fa-check-circle" style="color:var(--ok);font-size:16px"></i><span style="color:var(--ok)">KPI đã được ghi nhận! Đang mở form nhập KPI tiếp theo...</span>';
    mbEl.appendChild(okBanner);
  }
  const mfEl=document.getElementById('MF');
  if(mfEl){
    mfEl.innerHTML='<button class="btn btn-s btn-ok" disabled style="opacity:0.7;cursor:not-allowed"><i class="fas fa-check-circle"></i> Đã gửi thành công</button>';
  }
  toast('Đã gửi KPI cá nhân thành công!','ok');
  // Sau 1.5s reset form để nhập KPI mới
  setTimeout(()=>{
    addPK(uid,mid);
  },1500);
}
function addTK(uid,mid){const ud=gU(uid);if(!ud.tasks[mid])ud.tasks[mid]=[];ud.tasks[mid].push({name:'',desc:'',score:0,deadline:'',done:false});sv();_exp.add('s'+uid);R()}

@media print{
  body{background:#fff!important}
  .sb,.tp,#btnSyncNow,.tC,#globalSearchBox{display:none!important}
  .mn{margin-left:0!important}
  .cd{break-inside:avoid;border:1px solid #ddd!important;margin-bottom:12px!important;box-shadow:none!important}
  canvas{max-width:100%!important}
  @page{margin:15mm;size:A4}
}
</style>

  <!-- Unit Selector -->
  <div style="display:flex;align-items:center;gap:10px;margin-bottom:18px;flex-wrap:wrap">
    <div style="position:relative;flex:1;min-width:200px;max-width:380px">
      <i class="fas fa-search" style="position:absolute;left:11px;top:50%;transform:translateY(-50%);color:#38bdf8;pointer-events:none;font-size:14px;z-index:1"></i>
      <input id="mkUnitSearch" type="text" placeholder="🔍 Tìm theo tên đơn vị..."
        style="width:100%;padding:9px 12px 9px 36px;background:#1e293b !important;border:2px solid var(--ac);border-radius:10px;color:#f1f5f9 !important;font-size:14px;font-weight:600;box-sizing:border-box;outline:none;-webkit-text-fill-color:#f1f5f9;cursor:pointer"
        oninput="document.getElementById('mkUnitDrop').style.display='block';const v=this.value.toLowerCase();document.querySelectorAll('.mk-unit-opt').forEach(o=>{o.style.display=o.dataset.name.includes(v)?'':'none'})"
        onfocus="this.style.background='#1e293b';this.style.boxShadow='0 0 0 3px rgba(99,102,241,.3)';document.getElementById('mkUnitDrop').style.display='block'"
        onblur="this.style.boxShadow='none';setTimeout(()=>{const d=document.getElementById('mkUnitDrop');if(d)d.style.display='none'},200)"
        value="${u.name}">
      <div id="mkUnitDrop" style="display:none;position:absolute;top:calc(100% + 6px);left:0;right:0;background:#0f172a;border:2px solid var(--ac);border-radius:12px;box-shadow:0 16px 40px rgba(0,0,0,.6),0 0 0 1px rgba(255,255,255,.05);z-index:9999;max-height:260px;overflow-y:auto;padding:6px">
        ${visibleUnits().map(uu=>`<div class="mk-unit-opt" data-name="${uu.name.toLowerCase()}" data-id="${uu.id}"
          style="padding:10px 14px;cursor:pointer;font-size:13px;font-weight:600;display:flex;align-items:center;gap:10px;color:${uu.id===uid?'#fff':'#cbd5e1'};border-radius:8px;margin-bottom:3px;border:1px solid ${uu.id===uid?'var(--ac)':'transparent'};background:${uu.id===uid?'linear-gradient(135deg,var(--ac),var(--ac)cc)':'transparent'};box-shadow:${uu.id===uid?'0 2px 10px rgba(99,102,241,.4)':'none'};transition:all .18s"
          onmouseover="if('${uu.id}'!=='${uid}')this.style.background='#1e3a5f';this.style.borderColor='rgba(59,130,246,.5)';this.style.color='#fff';this.style.transform='translateX(2px)'"
          onmouseout="if('${uu.id}'!=='${uid}'){this.style.background='transparent';this.style.borderColor='transparent';this.style.color='#cbd5e1';this.style.transform='none'}"
          onmousedown="DU='${uu.id}';document.getElementById('mkUnitSearch').value='${uu.name}';document.getElementById('mkUnitDrop').style.display='none';R()">
          <span style="width:11px;height:11px;border-radius:50%;background:${uu.color};flex-shrink:0;box-shadow:${uu.id===uid?'0 0 0 2px #fff,0 0 8px rgba(255,255,255,.3)':'none'}"></span>
          <span style="flex:1">${uu.name}</span>
          <span style="font-size:11px;color:#94a3b8;font-weight:400">${memsOf(uu.id).length} TV · ${uScore(uu.id)}%</span>
          ${uu.id===uid?'<i class="fas fa-check" style="color:#38bdf8"></i>':'<i class="fas fa-chevron-right" style="color:#64748b;font-size:11px"></i>'}
        </div>`).join('')}
      </div>
    </div>
    <div style="display:flex;align-items:center;gap:8px;padding:8px 14px;background:${u.color}15;border:2px solid ${u.color};border-radius:10px;font-size:13px;font-weight:700;color:${u.color}">
      <span style="width:11px;height:11px;border-radius:50%;background:${u.color};flex-shrink:0;box-shadow:0 0 0 3px ${u.color}30"></span>
      <span>${u.name}</span>
      <span style="font-size:11px;opacity:.7;font-weight:400">· ${ms.length} thành viên</span>
    </div>
  </div>

  <!-- Tab bar -->
  <div class="mk-tabs">
    <span class="mk-tab${curTab==='overview'?' on':''}" onclick="_mkTab['${uid}']='overview';R()"><i class="fas fa-th-large"></i> Tổng quan</span>
    <span class="mk-tab${curTab==='shared'?' on':''}" onclick="_mkTab['${uid}']='shared';R()"><i class="fas fa-flag"></i> KPI Chung</span>
    <span class="mk-tab${curTab==='personal'?' on':''}" onclick="_mkTab['${uid}']='personal';R()"><i class="fas fa-bullseye"></i> KPI Cá nhân</span>
    <span class="mk-tab${curTab==='tasks'?' on':''}" onclick="_mkTab['${uid}']='tasks';R()"><i class="fas fa-clipboard-list"></i> Công việc</span>
  </div>

  <!-- PANEL: TỔNG QUAN -->
  <div class="mk-panel${curTab==='overview'?' on':''}">
    ${ms.map(mem=>{
      const sc=mScore(uid,mem.id);
      const _shKpis=(ud.shared||[]).filter(sk=>sk.members?.[mem.id]?.target>0);
      const _pkKpis=(ud.personal?.[mem.id]||[]);
      const _tasks=(ud.tasks?.[mem.id]||[]);
      const _allKpi=[..._shKpis.map(sk=>{const md=sk.members[mem.id];return{name:sk.name,pct:kPct(md.target,md.daily)}}),..._pkKpis.map(k=>({name:k.name,pct:kPct(k.target,k.daily)}))];
      const _done=_allKpi.filter(x=>x.pct>=100).length;
      const _near=_allKpi.filter(x=>x.pct>=80&&x.pct<100).length;
      const _miss=_allKpi.filter(x=>x.pct<80).length;
      const _tdone=_tasks.filter(t=>t.done).length;
      return `<div class="cd" style="margin-bottom:14px">
        <div class="ch">
          <h3><i class="fas fa-user" style="color:var(--cyan)"></i> ${mem.name} <span style="font-size:12px;color:var(--t3);font-weight:400">${mem.position||''}</span></h3>
          <span style="font-size:22px;font-weight:800;color:${kCol(sc)}">${sc}%</span>
        </div>
        <div class="cb">
          <div class="overview-grid">
            <div class="ov-stat"><div class="ov-stat-val" style="color:var(--ac)">${_allKpi.length}</div><div class="ov-stat-lbl">Tổng KPI</div></div>
            <div class="ov-stat"><div class="ov-stat-val" style="color:var(--ok)">${_done}</div><div class="ov-stat-lbl">✓ Hoàn thành</div></div>
            <div class="ov-stat"><div class="ov-stat-val" style="color:var(--wn)">${_near}</div><div class="ov-stat-lbl">~ Gần đạt</div></div>
            <div class="ov-stat"><div class="ov-stat-val" style="color:var(--ng)">${_miss}</div><div class="ov-stat-lbl">✗ Chưa đạt</div></div>
            <div class="ov-stat"><div class="ov-stat-val" style="color:var(--purple)">${_tdone}/${_tasks.length}</div><div class="ov-stat-lbl">Việc xong/tổng</div></div>
          </div>
          ${_allKpi.length?`<div style="font-size:12px;font-weight:700;color:var(--t3);margin-bottom:8px">TIẾN ĐỘ TỪNG KPI</div>
          ${_allKpi.map(k=>`<div style="margin-bottom:8px">
            <div style="display:flex;justify-content:space-between;font-size:13px;margin-bottom:3px">
              <span>${k.name||'(Chưa đặt tên)'}</span>
              <span style="font-weight:700;color:${kCol(k.pct)}">${k.pct}%</span>
            </div>
            <div class="progress-bar-wrap"><div class="progress-bar-fill" style="width:${k.pct}%;background:${kCol(k.pct)}"></div></div>
          </div>`).join('')}`:'<div class="empty"><p>Chưa có KPI nào.</p></div>'}
        </div>
      </div>`;}).join('')}
  </div>

  <!-- PANEL: KPI CHUNG -->
  <div class="mk-panel${curTab==='shared'?' on':''}">
    <!-- Member selector -->
    <div class="mem-pills">
      ${ms.map(mem=>`<span class="mem-pill${curMem===mem.id?' on':''}" onclick="_mkMem['${uid}']='${mem.id}';R()">${mem.name}</span>`).join('')}
    </div>
    ${ms.filter(mem=>mem.id===curMem).map(mem=>{
      const canEdit=(U&&U.id!==mem.id&&(ROLE_LEVEL[U.role]||0)>(ROLE_LEVEL[mem.role]||0));
      const canInputDaily=(U&&(U.id===mem.id||(ROLE_LEVEL[U.role]||0)>(ROLE_LEVEL[mem.role]||0)));
      const shList=(ud.shared||[]).filter(sk=>sk.members?.[mem.id]?.target>0);
      return `<div>
        ${shList.length?shList.map((sk,_si)=>{
          const si=(ud.shared||[]).indexOf(sk);
          const md=sk.members[mem.id];const p=kPct(md.target,md.daily);
          return `<div class="kpi-detail-card">
            <div class="kpi-detail-hd">
              <div>
                <div style="font-weight:700;font-size:15px">${sk.name}</div>
                ${sk.desc?`<div style="font-size:12px;color:var(--t3);margin-top:2px">${sk.desc}</div>`:''}
                <div style="display:flex;gap:10px;flex-wrap:wrap;margin-top:4px;font-size:12px;color:var(--t2)">
                  ${sk.deadline?`<span><i class="fas fa-calendar-alt" style="color:var(--t3)"></i> ${fD(sk.deadline)}${new Date(sk.deadline)<new Date()?' <span style="color:var(--ng)">⚠ Quá hạn</span>':''}</span>`:''}
                  ${sk.score?`<span><i class="fas fa-star" style="color:var(--gold)"></i> ${sk.score} điểm CV</span>`:''}
                </div>
              </div>
              <div style="display:flex;flex-direction:column;align-items:flex-end;gap:6px">
                <span class="badge ${kC(p)}" style="font-size:14px;padding:4px 10px">${p}%</span>
                <span style="font-size:11px;color:var(--t3)">${kSt(p)}</span>
                ${(ROLE_LEVEL[U?.role]||0)>(ROLE_LEVEL[D.members.find(m=>m.id===mem.id)?.role]||0)?`
                  <div style="display:flex;flex-direction:column;align-items:flex-end;gap:6px;margin-top:2px">
                    <label style="display:flex;align-items:center;gap:5px;cursor:pointer;padding:5px 10px;background:var(--inp);border:1.5px solid var(--brd);border-radius:7px;font-size:12px;color:var(--t2)">
                      <input type="checkbox" class="ck" ${md.confirmed?'checked':''} onchange="_cSK('${uid}',${si},'${mem.id}',this.checked)">
                      <span style="font-weight:600">${md.confirmed?'✓ Đã xác nhận':'Xác nhận'}</span>
                    </label>
                    <div style="display:flex;align-items:center;gap:6px">
                      <span style="font-size:11px;color:var(--t3);font-weight:600">Chấm điểm:</span>
                      <input type="number" min="0" max="${sk.score||100}"
                        value="${sk.result??''}" placeholder="/${sk.score||100}"
                        style="width:70px;padding:5px 8px;background:var(--inp);border:1.5px solid var(--brd);border-radius:7px;color:var(--t1);font-size:13px;font-weight:700;text-align:center;outline:none"
                        onfocus="this.style.borderColor='var(--ac)'"
                        onblur="this.style.borderColor='var(--brd)'"
                        onchange="gU('${uid}').shared[${si}].result=Number(this.value)||0;sv();R()">
                    </div>
                  </div>`
                :(md.confirmed?'<span style="color:var(--ok);font-size:12px"><i class="fas fa-check-circle"></i> Đã XN</span>':'')}
              </div>
            </div>
            ${dailyGrid(md.daily,md.target,`_uSK('${uid}',${si},'${mem.id}')`,!canInputDaily)}
            ${(sk.result!==undefined&&sk.result!==''&&sk.result!==null&&sk.result!==0)?`<div style="margin-top:8px;padding:8px 12px;border-radius:6px;background:${sk.result>=(sk.score||100)*.8?'var(--okb)':sk.result>=(sk.score||100)*.5?'var(--wnb)':'var(--ngb)'};border-left:3px solid ${sk.result>=(sk.score||100)*.8?'var(--ok)':sk.result>=(sk.score||100)*.5?'var(--wn)':'var(--ng)'}">
              <i class="fas fa-star" style="color:${sk.result>=(sk.score||100)*.8?'var(--ok)':sk.result>=(sk.score||100)*.5?'var(--wn)':'var(--ng)'}"></i>
              <span style="font-size:13px;font-weight:600;color:var(--t2)"> Điểm đánh giá Lãnh đạo: </span>
              <strong style="font-size:15px;color:${sk.result>=(sk.score||100)*.8?'var(--ok)':sk.result>=(sk.score||100)*.5?'var(--wn)':'var(--ng)'}">${sk.result}/${sk.score||100}</strong>
              <span style="font-size:12px;margin-left:6px">${sk.result>=(sk.score||100)*.8?'✅ Tốt':sk.result>=(sk.score||100)*.5?'⚠️ Trung bình':'❌ Cần cải thiện'}</span>
            </div>`:''}</div>`}).join('')
          :'<div class="empty"><p>Thành viên này chưa được giao KPI Chung nào.</p></div>'}
      </div>`;}).join('')}
  </div>

  <!-- PANEL: KPI CÁ NHÂN -->
  <div class="mk-panel${curTab==='personal'?' on':''}">
    <div class="mem-pills">
      ${ms.map(mem=>`<span class="mem-pill${curMem===mem.id?' on':''}" onclick="_mkMem['${uid}']='${mem.id}';R()">${mem.name}</span>`).join('')}
    </div>
    ${ms.filter(mem=>mem.id===curMem).map(mem=>{
      const canEdit=(U&&U.id!==mem.id&&(ROLE_LEVEL[U.role]||0)>(ROLE_LEVEL[mem.role]||0));
      const canInputDaily=(U&&(U.id===mem.id||(ROLE_LEVEL[U.role]||0)>(ROLE_LEVEL[mem.role]||0)));
      const pkList=(ud.personal?.[mem.id]||[]);
      return `<div>
        ${pkList.length?pkList.map((k,ki)=>{const p=kPct(k.target,k.daily);
          return `<div class="kpi-detail-card">
            <div class="kpi-detail-hd">
              <div>
                <div style="font-weight:700;font-size:15px">${k.name||'(Chưa đặt tên)'}</div>
                ${k.desc?`<div style="font-size:12px;color:var(--t3);margin-top:2px">${k.desc}</div>`:''}
                <div style="display:flex;gap:10px;flex-wrap:wrap;margin-top:4px;font-size:12px;color:var(--t2)">
                  ${k.deadline?`<span><i class="fas fa-calendar-alt" style="color:var(--t3)"></i> ${fD(k.deadline)}${new Date(k.deadline)<new Date()?' <span style="color:var(--ng)">⚠ Quá hạn</span>':''}</span>`:''}
                  ${k.score?`<span><i class="fas fa-star" style="color:var(--gold)"></i> ${k.score} điểm CV</span>`:''}
                </div>
              </div>
              <div style="display:flex;flex-direction:column;align-items:flex-end;gap:6px">
                <span class="badge ${kC(p)}" style="font-size:14px;padding:4px 10px">${p}%</span>
                <span style="font-size:11px;color:var(--t3)">${kSt(p)}</span>
                ${(ROLE_LEVEL[U?.role]||0)>(ROLE_LEVEL[D.members.find(m=>m.id===mem.id)?.role]||0)?`
                  <div style="display:flex;flex-direction:column;align-items:flex-end;gap:6px;margin-top:2px">
                    <label style="display:flex;align-items:center;gap:5px;cursor:pointer;padding:5px 10px;background:var(--inp);border:1.5px solid var(--brd);border-radius:7px;font-size:12px;color:var(--t2)">
                      <input type="checkbox" class="ck" ${k.confirmed?'checked':''} ${!canEdit?'disabled style="opacity:.4;cursor:not-allowed"':''} onchange="_cPK('${uid}','${mem.id}',${ki},this.checked)">
                      <span style="font-weight:600">${k.confirmed?'✓ Đã xác nhận':'Xác nhận'}</span>
                    </label>
                    <div style="display:flex;align-items:center;gap:6px">
                      <span style="font-size:11px;color:var(--t3);font-weight:600">Chấm điểm:</span>
                      <input type="number" min="0" max="${k.score||100}"
                        value="${k.result??''}" placeholder="/${k.score||100}"
                        style="width:70px;padding:5px 8px;background:var(--inp);border:1.5px solid var(--brd);border-radius:7px;color:var(--t1);font-size:13px;font-weight:700;text-align:center;outline:none"
                        onfocus="this.style.borderColor='var(--ac)'"
                        onblur="this.style.borderColor='var(--brd)'"
                        onchange="gU('${uid}').personal['${mem.id}'][${ki}].result=Number(this.value)||0;sv();toast('✔ Đã lưu kết quả','ok')" onblur="gU('${uid}').personal['${mem.id}'][${ki}].result=Number(this.value)||0;sv()">
                    </div>
                  </div>`
                :(k.confirmed?'<span style="color:var(--ok);font-size:12px"><i class="fas fa-check-circle"></i> Đã XN</span>':'')}
              </div>
            </div>
            <div style="display:flex;align-items:center;gap:8px;padding:8px 12px;background:var(--inp);border:1.5px solid var(--brd);border-radius:8px;margin:8px 0 4px 0">
              <i class="fas fa-link" style="color:var(--ac);font-size:13px;flex-shrink:0"></i>
              <input type="url"
                value="${k.driveLink||''}"
                placeholder="Dán link Google Drive / minh chứng KPI..."
                style="flex:1;background:transparent;border:none;outline:none;color:var(--t1);font-size:13px;min-width:0"
                ${!canInputDaily?'disabled style="flex:1;background:transparent;border:none;outline:none;color:var(--t3);font-size:13px;min-width:0;cursor:not-allowed"':''}
                onchange="gU('${uid}').personal['${mem.id}'][${ki}].driveLink=this.value.trim();sv();toast('✔ Đã lưu link minh chứng','ok')"
                onblur="gU('${uid}').personal['${mem.id}'][${ki}].driveLink=this.value.trim();sv()">
              ${k.driveLink?`<a href="${k.driveLink}" target="_blank" style="flex-shrink:0;padding:3px 10px;background:var(--acg);border:1px solid var(--ac);border-radius:6px;color:var(--ac);font-size:12px;font-weight:600;text-decoration:none;white-space:nowrap"><i class="fas fa-external-link-alt"></i> Mở</a>`:''}
            </div>
            ${dailyGrid(k.daily,k.target,`_uPK('${uid}','${mem.id}',${ki})`,!canInputDaily)}
            ${(k.result!==undefined&&k.result!==''&&k.result!==null&&k.result!==0)?`<div style="margin-top:8px;padding:8px 12px;border-radius:6px;background:${k.result>=(k.score||100)*.8?'var(--okb)':k.result>=(k.score||100)*.5?'var(--wnb)':'var(--ngb)'};border-left:3px solid ${k.result>=(k.score||100)*.8?'var(--ok)':k.result>=(k.score||100)*.5?'var(--wn)':'var(--ng)'}">
              <i class="fas fa-star" style="color:${k.result>=(k.score||100)*.8?'var(--ok)':k.result>=(k.score||100)*.5?'var(--wn)':'var(--ng)'}"></i>
              <span style="font-size:13px;font-weight:600;color:var(--t2)"> Điểm đánh giá Lãnh đạo: </span>
              <strong style="font-size:15px;color:${k.result>=(k.score||100)*.8?'var(--ok)':k.result>=(k.score||100)*.5?'var(--wn)':'var(--ng)'}">${k.result}/${k.score||100}</strong>
              <span style="font-size:12px;margin-left:6px">${k.result>=(k.score||100)*.8?'✅ Tốt':k.result>=(k.score||100)*.5?'⚠️ Trung bình':'❌ Cần cải thiện'}</span>
            </div>`:''}</div>`}).join('')
          :'<div class="empty"><p>Chưa có KPI Cá nhân nào.</p></div>'}
      </div>`;}).join('')}
  </div>

  <!-- PANEL: CÔNG VIỆC -->
  <div class="mk-panel${curTab==='tasks'?' on':''}">
    <div class="mem-pills">
      ${ms.map(mem=>`<span class="mem-pill${curMem===mem.id?' on':''}" onclick="_mkMem['${uid}']='${mem.id}';R()">${mem.name}</span>`).join('')}
    </div>
    ${ms.filter(mem=>mem.id===curMem).map(mem=>{
      const canEdit=(U&&U.id!==mem.id&&(ROLE_LEVEL[U.role]||0)>(ROLE_LEVEL[mem.role]||0));
      const canInputDaily=(U&&(U.id===mem.id||(ROLE_LEVEL[U.role]||0)>(ROLE_LEVEL[mem.role]||0)));
      const tkList=(ud.tasks?.[mem.id]||[]);
      const done=tkList.filter(t=>t.done).length;
      return `<div>
        <div style="display:flex;gap:10px;margin-bottom:14px;align-items:center">
          <span style="font-size:13px;color:var(--t2)">Tổng: <strong>${tkList.length}</strong></span>
          <span style="font-size:13px;color:var(--ok)">✓ Xong: <strong>${done}</strong></span>
          <span style="font-size:13px;color:var(--ng)">✗ Còn lại: <strong>${tkList.length-done}</strong></span>
        </div>
        ${tkList.length?tkList.map((t,ti)=>{
          const dl=t.deadline?`<span style="font-size:12px;color:${new Date(t.deadline)<new Date()?'var(--ng)':'var(--t3)'}"><i class="fas fa-calendar-alt"></i> ${fD(t.deadline)}${new Date(t.deadline)<new Date()?' ⚠':''}</span>`:''
          return `<div class="task-row" style="border-left:3px solid ${t.done?'var(--ok)':'var(--wn)'}">
            <div style="flex:1">
              <div style="font-weight:600;font-size:14px;${t.done?'text-decoration:line-through;color:var(--t3)':''}">${t.name||'(Chưa đặt tên)'}</div>
              ${t.desc?`<div style="font-size:12px;color:var(--t3);margin-top:2px">${t.desc}</div>`:''}
              <div style="display:flex;gap:10px;margin-top:4px;flex-wrap:wrap">${dl}${t.score?`<span style="font-size:12px;color:var(--t2)"><i class="fas fa-star" style="color:var(--gold)"></i> ${t.score} điểm</span>`:''}</div>
            </div>
            <div style="display:flex;align-items:center;gap:8px">
              <span class="badge ${t.done?'ok':'ng'}">${t.done?'✓ Xong':'Chưa'}</span>
              ${canEdit?`<input type="checkbox" class="ck" ${t.done?'checked':''} onchange="uTK('${uid}','${mem.id}',${ti},this.checked)" title="Đánh dấu xong">`:''}</div>
          </div>`;}).join('')
        :'<div class="empty"><p>Chưa có công việc nào.</p></div>'}

function getUnitBank(uid){
  if(!D.eval.unitBank)D.eval.unitBank={};
  if(!D.eval.unitBank[uid]){
    // Initialize from global bank if not set
    D.eval.unitBank[uid]=JSON.parse(JSON.stringify(D.eval.bank));
  }
  return D.eval.unitBank[uid];
}

function copyBankFromUnit(toUid){
  const others=D.units.filter(u=>u.id!==toUid);

function doCopyBank(toUid){

function showCritTab(t,el,uid){el.parentElement.querySelectorAll('.tab').forEach(x=>x.classList.remove('on'));el.classList.add('on');document.getElementById('critList').innerHTML=critTable(t,uid)}
function critTable(type,uid){const bank=getUnitBank(uid);const list=bank.filter(x=>x.type===type);

      <div class="fg"><label>Điểm max</label><input type="number" id="crM" value="${cr?.max||10}" min="1" max="10"></div></div>

function saveCrit(eid,uid){const name=document.getElementById('crN').value.trim();if(!name){toast('Nhập tên','ng');return}

function delCrit(id,uid){if(!confirm('Xóa?'))return;const bank=getUnitBank(uid);D.eval.unitBank[uid]=bank.filter(x=>x.id!==id);sv();renderEBankUnit()}

function getMonthCriteria(uid,type){const bank=getUnitBank(uid);const ids=(D.eval.monthSetup[CM]||{})[uid]||bank.map(x=>x.id);return bank.filter(x=>ids.includes(x.id)&&(!type||x.type===type))}
function rEScore(c){
  c.innerHTML=`<div class="fi"><div class="cd"><div class="ch"><h3><i class="fas fa-star-half-alt" style="color:var(--wn)"></i> Chấm điểm theo tiêu chí tháng ${CM}</h3></div>

      <td><span class="badge ${e.result==='pass'?'ok':'ng'}">${e.result==='pass'?'Đạt':'Chưa đạt'}</span></td></tr>`).join('')}

function renderScoreForm(){

function _previewPhoto(cid,val){
  const lnk=document.getElementById('ph_lnk_'+cid);
  const ok=document.getElementById('ph_ok_'+cid);
  if(!lnk||!ok)return;
  const v=val.trim();
  if(v&&(v.startsWith('http')||v.startsWith('https'))){
    lnk.href=v;lnk.style.display='inline';ok.style.display='inline';
  }else{lnk.style.display='none';ok.style.display='none';}
}

function calcSc(uid){const hw=getMonthCriteria(uid,'hw'),sw=getMonthCriteria(uid,'sw');
  const hwM=hw.reduce((s,x)=>s+x.max,0),swM=sw.reduce((s,x)=>s+x.max,0);let hwS=0,swS=0;
  document.querySelectorAll('#scForm select[data-cid]').forEach(sel=>{const v=parseInt(sel.value)||0;if(sel.dataset.type==='hw')hwS+=v;else swS+=v});
  const t=hwS+swS,m=hwM+swM;
  const e1=document.getElementById('scHw'),e2=document.getElementById('scSw'),e3=document.getElementById('scT');
  if(e1)e1.textContent=`${hwS}/${hwM}`;if(e2)e2.textContent=`${swS}/${swM}`;
  if(e3){e3.textContent=`${t}/${m}`;e3.style.color=m>0&&t>=m*.6?'var(--ok)':'var(--ng)'}}

function saveSc(uid){const unit=D.units.find(u=>u.id===uid);const hw=getMonthCriteria(uid,'hw'),sw=getMonthCriteria(uid,'sw');
  const hwM=hw.reduce((s,x)=>s+x.max,0),swM=sw.reduce((s,x)=>s+x.max,0);let hwS=0,swS=0,details={},photos={};
  document.querySelectorAll('#scForm select[data-cid]').forEach(sel=>{const v=parseInt(sel.value)||0;details[sel.dataset.cid]=v;if(sel.dataset.type==='hw')hwS+=v;else swS+=v});
  document.querySelectorAll('#scForm input[data-photo]').forEach(inp=>{const v=inp.value.trim();if(v)photos[inp.dataset.photo]=v});
  const total=hwS+swS,maxS=hwM+swM;
  if(!D.eval.scores)D.eval.scores=[];
  D.eval.scores.push({id:'sc_'+Date.now(),unitId:uid,unitName:unit?.name,date:document.getElementById('scDate').value,hwS,swS,hwM:hwM,swM:swM,total,maxS,result:maxS>0&&total>=maxS*.6?'pass':'fail',details,photos,note:document.getElementById('scNote').value});
  sv();toast('Đã lưu đánh giá','ok');R()}

// II. ĐÁNH GIÁ — TỔNG HỢP BÁO CÁO
function rERep(c){
  if(!D.eval.reports)D.eval.reports=[];
  if(!D.eval.scores)D.eval.scores=[];

    });

function openEStaff(eid){
  if(!isAdmin()){toast('Chỉ Lãnh đạo mới có quyền','ng');return}
  const s=eid?D.efb.staff.find(x=>x.id===eid):null;
  const staffIds=new Set(D.efb.staff.map(x=>x.id));
  const available=D.members.filter(m=>!staffIds.has(m.id)||(s&&m.id===s.id));
  document.getElementById('MT').textContent=s?'Sửa nhân sự BHQ':'Thêm nhân sự BHQ';
  document.getElementById('MB').innerHTML=`
    <div class="fg"><label>Chọn thành viên</label>
      <select id="esMid" ${s?'disabled':''} style="width:100%;padding:10px;background:var(--inp);border:1px solid var(--brd);border-radius:8px;color:var(--t1);font-family:inherit;font-size:15px">
        ${s?`<option value="${s.id}" selected>${s.name}</option>`:available.map(m=>`<option value="${m.id}">${m.name} — ${m.position}</option>`).join('')}
      </select>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
      <div class="fg"><label>Vai trò BHQ</label><input type="text" id="esR" value="${s?.role||'Thành viên BHQ'}" placeholder="VD: Trưởng ban"></div>
      <div class="fg"><label>SĐT</label><input type="text" id="esP" value="${s?.phone||''}"></div></div>`;
  document.getElementById('MF').innerHTML=`<button class="btn btn-s btn-o" onclick="cM()">Hủy</button><button class="btn btn-s btn-ok" onclick="saveEStaff('${eid||''}')"><i class="fas fa-save"></i> Lưu</button>`;
  document.getElementById('MO').classList.add('on')}

function saveEStaff(eid){
  const mid=eid?eid:document.getElementById('esMid').value;
  if(!mid){toast('Chọn thành viên','ng');return}
  const mem=D.members.find(m=>m.id===mid);
  if(!mem){toast('Không tìm thấy thành viên','ng');return}
  const obj={id:mid,name:mem.name,role:document.getElementById('esR').value||'Thành viên BHQ',phone:document.getElementById('esP').value};
  if(eid){const i=D.efb.staff.findIndex(x=>x.id===eid);D.efb.staff[i]={...D.efb.staff[i],...obj}}else{D.efb.staff.push(obj)}
  sv();cM();toast('Đã lưu','ok');R()}

function delEStaff(id){if(!isAdmin()){toast('Chỉ Lãnh đạo mới có quyền','ng');return}if(!confirm('Xóa nhân sự BHQ này?'))return;D.efb.staff=D.efb.staff.filter(x=>x.id!==id);sv();R()}

      <div class="cb">
        <div style="margin-bottom:8px"><strong>Đơn vị:</strong> ${D.units.find(u=>u.id===a.unitId)?.name||'-'}</div>

            <td>${isAdmin()?`<button class="btn btn-x ${t.done?'btn-ok':'btn-ng'}" onclick="_toggleAssignTask('${a.id}',${i})" style="min-width:72px">${t.done?'<i class=\"fas fa-check\"></i> Xác nhận xong':'<i class=\"fas fa-times\"></i> Chưa xong'}</button>`:`<span class="badge ${t.done?'ok':'ng'}">${t.done?'✓ Đã xác nhận':'Chờ xác nhận'}</span>`}</td></tr>`).join('')}</tbody></table>`:''}</div></div>`}).join('')}</div>`;

  // Vẽ biểu đồ tự động đồng bộ dữ liệu
  if(totalTasks>0){
    setTimeout(()=>{
      const isDark=document.documentElement.getAttribute('data-theme')==='dark';
      const gridColor=isDark?'rgba(255,255,255,0.08)':'rgba(0,0,0,0.06)';
      const txtColor=isDark?'#94a3b8':'#475569';

      const c1=document.getElementById('chartAssignDoughnut');
      if(c1) new Chart(c1,{
        type:'doughnut',
        data:{labels:['Hoàn thành','Đang làm','Quá hạn'],
          datasets:[{data:[doneTasks,pendingTasks,overdueTasks],
            backgroundColor:['rgba(5,150,105,0.85)','rgba(217,119,6,0.85)','rgba(220,38,38,0.85)'],
            borderWidth:2,borderColor:isDark?'#1e293b':'#fff',hoverOffset:6}]},
        options:{responsive:true,cutout:'60%',
          plugins:{legend:{position:'bottom',labels:{font:{size:10},color:txtColor,padding:8,usePointStyle:true,boxWidth:8}},
            tooltip:{callbacks:{label:ctx=>`${ctx.label}: ${ctx.raw} (${totalTasks>0?Math.round(ctx.raw/totalTasks*100):0}%)`}}},
          animation:{duration:800}}
      });

      const c2=document.getElementById('chartAssignBar');
      if(c2&&unitArr.length>0) new Chart(c2,{
        type:'bar',
        data:{labels:unitArr.map(u=>u.name.replace('Bán hàng ','').replace('Cửa hàng ','CH ')),
          datasets:[
            {label:'✓',data:unitArr.map(u=>unitStats[u.id].done),backgroundColor:'rgba(5,150,105,0.8)',borderRadius:3,borderSkipped:false},
            {label:'⏳',data:unitArr.map(u=>unitStats[u.id].pending),backgroundColor:'rgba(217,119,6,0.8)',borderRadius:3,borderSkipped:false},
            {label:'⚠',data:unitArr.map(u=>unitStats[u.id].overdue),backgroundColor:'rgba(220,38,38,0.8)',borderRadius:3,borderSkipped:false}
          ]},
        options:{responsive:true,
          plugins:{legend:{position:'bottom',labels:{font:{size:10},color:txtColor,padding:6,usePointStyle:true,boxWidth:8}},
            tooltip:{mode:'index',intersect:false}},
          scales:{
            x:{stacked:true,grid:{display:false},ticks:{color:txtColor,font:{size:10}}},
            y:{stacked:true,beginAtZero:true,grid:{color:gridColor},ticks:{color:txtColor,stepSize:1,font:{size:10}}}},
          animation:{duration:700}}
      });
    },100);
  }
}

function taskRowHTML(idx,t){
  const persons=Array.isArray(t?.persons)?t.persons:(t?.person?[t.person]:[]);
  const wrapId='mswrap'+idx;
  const staffItems=(D.efb.staff||[]).map(s=>`<label class="ms-item"><input type="checkbox" value="${s.name}" ${persons.includes(s.name)?'checked':''} onchange="msCheck(this,'${wrapId}')">${s.name}</label>`).join('');
  const chipHTML=persons.length?persons.map(n=>`<span class="ms-chip">${n}</span>`).join(''):'<span class="ms-placeholder">— Người thực hiện —</span>';
  const noStaff=!(D.efb.staff||[]).length;
  return `<div style="display:grid;grid-template-columns:1fr 130px 1fr 30px;gap:8px;margin-bottom:8px;align-items:start" id="tkr${idx}">
    <input type="text" class="fg" style="margin:0" placeholder="Nội dung công việc" value="${t?.name||''}" data-f="name">
    <input type="date" class="fg" style="margin:0" value="${t?.date||''}" data-f="date">
    <div class="ms-wrap" id="${wrapId}" data-f="persons">
      <div class="ms-box" onclick="msToggle(this)">${noStaff?'<span class="ms-placeholder">Chưa có nhân sự BHQ</span>':chipHTML}</div>
      <div class="ms-dropdown">${noStaff?'<div style="padding:8px 10px;color:var(--t3);font-size:12px">Chưa có nhân sự BHQ</div>':staffItems}</div>
    </div>
    <button class="btn btn-x btn-ng" onclick="this.parentElement.remove()"><i class="fas fa-times"></i></button></div>`}

function addTaskRow(){_taskCount++;const c=document.getElementById('asTaskList');
  if(_taskCount===1)c.innerHTML='';
  const tmp=document.createElement('div');tmp.innerHTML=taskRowHTML(_taskCount,null);
  c.appendChild(tmp.firstElementChild)}

function saveAssign(eid){const title=document.getElementById('asT').value.trim();if(!title){toast('Nhập tiêu đề','ng');return}
  const staffIds=[...document.querySelectorAll('#asStaff input:checked')].map(cb=>cb.value);
  const rows=[...document.querySelectorAll('[id^=tkr]')];
  const tasks=rows.map(r=>({name:r.querySelector('[data-f=name]').value.trim(),date:r.querySelector('[data-f=date]').value,persons:[...r.querySelectorAll('.ms-wrap input:checked')].map(cb=>cb.value),done:false})).filter(t=>t.name);
  // Preserve done status from old tasks
  if(eid){const old=D.efb.assignments.find(x=>x.id===eid);if(old?.tasks)tasks.forEach(t=>{const ot=old.tasks.find(x=>x.name===t.name);if(ot)t.done=ot.done})}
  const obj={title,type:document.getElementById('asTy').value,period:document.getElementById('asP').value,unitId:document.getElementById('asU').value,staffIds,tasks};
  if(eid){const i=D.efb.assignments.findIndex(x=>x.id===eid);D.efb.assignments[i]={...D.efb.assignments[i],...obj}}else{obj.id='as_'+Date.now();obj.created=Date.now();D.efb.assignments.push(obj)}
  sv();cM();toast('Đã lưu','ok');R()}
function delAssign(id){if(!isAdmin()){toast('Chỉ Lãnh đạo mới có quyền','ng');return}if(!confirm('Xóa phân công này?'))return;D.efb.assignments=D.efb.assignments.filter(x=>x.id!==id);sv();R()}
function _toggleAssignTask(aid,ti){
  if(!isAdmin()){toast('Chỉ Lãnh đạo mới được xác nhận hoàn thành','ng');return}
  const a=D.efb.assignments.find(x=>x.id===aid);if(!a||!a.tasks[ti])return;
  a.tasks[ti].done=!a.tasks[ti].done;sv();
  toast(a.tasks[ti].done?'Đã xác nhận hoàn thành':'Đã đánh dấu chưa hoàn thành','ok');R()}

function rMReport(c){
  if(!D.memberReports)D.memberReports=[];
  const L=isLeader();
  // Leaders see all reports; staff sees own reports
  const myReports=L?D.memberReports:D.memberReports.filter(r=>r.fromId===U.id);
  const pending=myReports.filter(r=>r.status==='pending').length;
  const reviewed=myReports.filter(r=>r.status==='reviewed').length;
  
  c.innerHTML=`<div class="fi">
    <div class="srow">
      <div class="sbox"><div class="v" style="color:var(--ac)">${myReports.length}</div><div class="l">Tổng báo cáo</div></div>
      <div class="sbox"><div class="v" style="color:var(--wn)">${pending}</div><div class="l">Chờ xem xét</div></div>
      <div class="sbox"><div class="v" style="color:var(--ok)">${reviewed}</div><div class="l">Đã phản hồi</div></div>
    </div>
    
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;flex-wrap:wrap;gap:8px">
      <div class="tabs" style="margin-bottom:0">
        <button class="tab on" onclick="filterMR('all',this)">Tất cả (${myReports.length})</button>
        <button class="tab" onclick="filterMR('pending',this)">Chờ xem xét (${pending})</button>
        <button class="tab" onclick="filterMR('reviewed',this)">Đã phản hồi (${reviewed})</button>
      </div>
      <button class="btn btn-s btn-p" onclick="openMR()"><i class="fas fa-plus"></i> Tạo báo cáo</button>
    </div>
    <div id="mrList">${mrListHTML(myReports)}</div>
  </div>`}

var _mrFilter='all';
function filterMR(f,el){_mrFilter=f;if(el){el.parentElement.querySelectorAll('.tab').forEach(x=>x.classList.remove('on'));el.classList.add('on')}
  const L=isLeader();const all=L?D.memberReports:D.memberReports.filter(r=>r.fromId===U.id);
  const list=f==='all'?all:all.filter(r=>r.status===f);
  document.getElementById('mrList').innerHTML=mrListHTML(list)}

function mrListHTML(list){
  if(!list.length)return '<div class="empty"><i class="fas fa-file-signature"></i><p>Chưa có báo cáo nào</p></div>';
  return [...list].reverse().map(r=>{
    const unit=D.units.find(u=>u.id===(D.members.find(m=>m.id===r.fromId)?.unitId));
    return `<div class="meeting-card" onclick="viewMR('${r.id}')">
      <div style="display:flex;gap:14px;margin-bottom:8px;flex-wrap:wrap;color:var(--t2);font-size:13px">
        <span><i class="fas fa-calendar"></i> ${fD(r.date)}</span>
        <span><i class="fas fa-user"></i> ${r.fromName}</span>
        ${unit?`<span><i class="fas fa-building"></i> ${unit.name}</span>`:''}
        <span><i class="fas fa-calendar-alt"></i> Tháng ${r.month}</span>
        <span class="badge ${r.status==='pending'?'wn':'ok'}">${r.status==='pending'?'Chờ xem xét':'Đã phản hồi'}</span>
      </div>
      <div style="font-size:16px;font-weight:600;margin-bottom:5px">${r.title}</div>
      <div style="color:var(--t2);font-size:14px">${(r.content||'').substring(0,200)}${(r.content||'').length>200?'...':''}</div>
    </div>`}).join('')}

function openMR(eid){
  const r=eid?D.memberReports.find(x=>x.id===eid):null;
  document.getElementById('MT').textContent=r?'Sửa báo cáo':'Tạo báo cáo gửi Ban lãnh đạo';
  document.getElementById('MB').innerHTML=`
    <div class="dbox"><h4><i class="fas fa-info-circle"></i> Hướng dẫn</h4>
      <p>Báo cáo sẽ được gửi đến Ban lãnh đạo (TGĐ, Phó TGĐ) để tổng hợp và phản hồi.</p></div>
