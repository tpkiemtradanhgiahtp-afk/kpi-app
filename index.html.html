  document.getElementById('MF').innerHTML=`<button class="btn btn-s btn-o" onclick="cM()">Hủy</button><button class="btn btn-s btn-ok" onclick="saveMR('${eid||''}')"><i class="fas fa-save"></i> Gửi báo cáo</button>`;
  document.getElementById('MO').classList.add('on')}

function saveMR(eid){
  const title=document.getElementById('mrT').value.trim();if(!title){toast('Nhập tiêu đề','ng');return}
  const content=document.getElementById('mrC').value.trim();if(!content){toast('Nhập nội dung','ng');return}
  const obj={title,date:document.getElementById('mrD').value,month:document.getElementById('mrM').value,
    content,results:document.getElementById('mrR1').value,difficulties:document.getElementById('mrR2').value,proposals:document.getElementById('mrR3').value,
    links:document.getElementById('mrLinks').value.split('\n').map(l=>l.trim()).filter(l=>l)};
  if(eid){const i=D.memberReports.findIndex(x=>x.id===eid);D.memberReports[i]={...D.memberReports[i],...obj}}
  else{obj.id='mr_'+Date.now();obj.fromId=U.id;obj.fromName=U.name;obj.toRole='bld';obj.status='pending';obj.response='';obj.reviewedBy='';obj.reviewedDate='';obj.created=Date.now();D.memberReports.push(obj)}
  sv();cM();toast('Đã gửi báo cáo','ok');R()}

function viewMR(id){
  const r=D.memberReports.find(x=>x.id===id);if(!r)return;
  const unit=D.units.find(u=>u.id===(D.members.find(m=>m.id===r.fromId)?.unitId));
  const L=isLeader();
  const canEdit=(U.id===r.fromId&&r.status==='pending');
  document.getElementById('MT').textContent='Chi tiết báo cáo';
  document.getElementById('MB').innerHTML=`
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;flex-wrap:wrap;gap:8px">
      <h2 style="margin:0">${r.title}</h2>
      <span class="badge ${r.status==='pending'?'wn':'ok'}" style="font-size:14px">${r.status==='pending'?'Chờ xem xét':'Đã phản hồi'}</span>
    </div>
    <div style="display:flex;gap:14px;flex-wrap:wrap;margin-bottom:16px;color:var(--t2);font-size:13px">
      <span><i class="fas fa-user"></i> ${r.fromName}</span>
      ${unit?`<span><i class="fas fa-building"></i> ${unit.name}</span>`:''}
      <span><i class="fas fa-calendar"></i> ${fD(r.date)}</span>
      <span><i class="fas fa-calendar-alt"></i> Tháng ${r.month}</span>
    </div>
    <div style="margin-bottom:14px"><strong>Nội dung:</strong>
      <div style="padding:12px;background:var(--inp);border-radius:8px;margin-top:6px;white-space:pre-wrap;color:var(--t2);line-height:1.7">${r.content||'—'}</div></div>
    ${r.results?`<div style="margin-bottom:14px"><strong style="color:var(--ok)"><i class="fas fa-check-circle"></i> Kết quả chính:</strong>
      <div style="padding:12px;background:var(--okb);border-radius:8px;border-left:3px solid var(--ok);margin-top:6px;white-space:pre-wrap">${r.results}</div></div>`:''}
    ${r.difficulties?`<div style="margin-bottom:14px"><strong style="color:var(--ng)"><i class="fas fa-exclamation-triangle"></i> Khó khăn / Vướng mắc:</strong>
      <div style="padding:12px;background:var(--ngb);border-radius:8px;border-left:3px solid var(--ng);margin-top:6px;white-space:pre-wrap">${r.difficulties}</div></div>`:''}
    ${r.proposals?`<div style="margin-bottom:14px"><strong style="color:var(--ac)"><i class="fas fa-lightbulb"></i> Đề xuất / Kiến nghị:</strong>
      <div style="padding:12px;background:var(--acg);border-radius:8px;border-left:3px solid var(--ac);margin-top:6px;white-space:pre-wrap">${r.proposals}</div></div>`:''}
    ${(r.links||[]).length?`<div style="margin-bottom:14px"><strong style="color:var(--ac)"><i class="fas fa-link"></i> Tài liệu đính kèm:</strong>
      <div style="padding:12px;background:var(--inp);border-radius:8px;margin-top:6px">${r.links.map(lk=>`<div style="margin-bottom:4px"><a href="${lk}" target="_blank" rel="noopener" style="color:var(--ac);word-break:break-all"><i class="fas fa-external-link-alt"></i> ${lk}</a></div>`).join('')}</div></div>`:''}
    ${r.status==='reviewed'&&r.response?`<div style="margin-bottom:14px;padding:16px;background:linear-gradient(135deg,rgba(37,99,235,.06),rgba(124,58,237,.06));border:1px solid rgba(37,99,235,.2);border-radius:10px">
      <strong style="color:var(--ac)"><i class="fas fa-reply"></i> Phản hồi từ Ban lãnh đạo</strong>
      <div style="font-size:12px;color:var(--t3);margin:4px 0 8px">${r.reviewedBy} · ${fD(r.reviewedDate)}</div>
      <div style="white-space:pre-wrap;color:var(--t1)">${r.response}</div></div>`:''}
    ${L&&r.status==='pending'?`<div style="margin-top:16px;padding:16px;background:var(--inp);border:1px solid var(--brd);border-radius:10px">
      <div class="fg"><label><i class="fas fa-reply" style="color:var(--ac)"></i> Phản hồi của Ban lãnh đạo</label>
        <textarea id="mrResp" rows="4" placeholder="Nhập phản hồi, chỉ đạo, hướng dẫn..."></textarea></div>
      <button class="btn btn-s btn-ok" onclick="reviewMR('${r.id}')"><i class="fas fa-check"></i> Phản hồi & Duyệt</button>
    </div>`:''}`;
  let footer='';
  if(canEdit)footer+=`<button class="btn btn-s btn-o" onclick="cM();openMR('${r.id}')"><i class="fas fa-edit"></i> Sửa</button>`;
  if(canEdit||L)footer+=`<button class="btn btn-s btn-ng" onclick="if(confirm('Xóa báo cáo?')){D.memberReports=D.memberReports.filter(x=>x.id!=='${r.id}');sv();cM();R()}"><i class="fas fa-trash"></i></button>`;
  footer+=`<button class="btn btn-s btn-o" onclick="cM()">Đóng</button>`;
  document.getElementById('MF').innerHTML=footer;
  document.getElementById('MO').classList.add('on')}

function reviewMR(id){
  const resp=document.getElementById('mrResp').value.trim();
  if(!resp){toast('Nhập phản hồi','ng');return}
  const r=D.memberReports.find(x=>x.id===id);if(!r)return;
  r.status='reviewed';r.response=resp;r.reviewedBy=U.name;r.reviewedDate=new Date().toISOString().split('T')[0];
  sv();cM();toast('Đã phản hồi báo cáo','ok');R()}

// ============================================================
//  III. BAN HIỆU QUẢ — ĐÁNH GIÁ CÁC THÀNH VIÊN BAN
// ============================================================
const EVAL_CRITERIA=[
  {key:'attitude',name:'Thái độ & tinh thần làm việc',short:'Thái độ',desc:'Tích cực, chủ động, trách nhiệm'},
  {key:'quality',name:'Chất lượng công việc',short:'Chất lượng',desc:'Hoàn thành đúng, đủ, chất lượng cao'},
  {key:'teamwork',name:'Phối hợp nhóm',short:'Phối hợp',desc:'Hỗ trợ đồng đội, giao tiếp hiệu quả'},
  {key:'initiative',name:'Sáng tạo & cải tiến',short:'Sáng tạo',desc:'Đề xuất giải pháp mới, cải thiện quy trình'},
  {key:'compliance',name:'Tuân thủ quy định',short:'Tuân thủ',desc:'Chấp hành nội quy, quy trình, thời gian'}
];
function rEvalStaff(c){
  if(!D.efb.staffEvals)D.efb.staffEvals=[];
  const staff=D.efb.staff||[];
  const evals=D.efb.staffEvals.filter(e=>e.month===CM);
  const allEvals=[...D.efb.staffEvals].reverse();
  
  // Calc average per staff for current month
  function staffAvg(sid){
    const se=evals.filter(e=>e.staffId===sid);if(!se.length)return 0;
    return Math.round(se.reduce((s,e)=>{const sc=e.scores||{};const vals=EVAL_CRITERIA.map(cr=>+(sc[cr.key]||0));return s+vals.reduce((a,b)=>a+b,0)/vals.length},0)/se.length*10)/10;
  }
  function evalBadge(avg){return avg>=8?'ok':avg>=6?'wn':'ng'}
  function evalLabel(avg){return avg>=8?'Tốt':avg>=6?'Khá':avg>=4?'TB':'Yếu'}

  c.innerHTML=`<div class="fi">
    <div class="dbox"><h4><i class="fas fa-info-circle"></i> Đánh giá thành viên Ban hiệu quả</h4>
      <p>Đánh giá hiệu quả làm việc của từng thành viên Ban theo 5 tiêu chí, thang điểm 1-10. Kết quả được tổng hợp theo tháng.</p></div>
    
    ${!staff.length?'<div class="empty"><i class="fas fa-users"></i><p>Chưa có nhân sự BHQ. Vui lòng thêm ở mục <strong>Nhân sự BHQ</strong>.</p></div>':`
    <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:16px">
      <div class="sc" style="cursor:default">
        <div class="si bl"><i class="fas fa-users"></i></div>
        <div class="sv">${staff.length}</div>
        <div class="sl">Thành viên BHQ</div>
      </div>
      <div class="sc" style="cursor:default">
        <div class="si gn"><i class="fas fa-star"></i></div>
        <div class="sv">${evals.length}</div>
        <div class="sl">Lượt ĐG tháng này</div>
      </div>
      <div class="sc" style="cursor:default">
        <div class="si ${(()=>{const _avgs=staff.map(s=>staffAvg(s.id)).filter(x=>x>0);const _mean=_avgs.length?Math.round(_avgs.reduce((a,b)=>a+b,0)/_avgs.length*10)/10:0;return _mean>=8?'gn':_mean>=6?'yl':'rd'})()}"><i class="fas fa-chart-line"></i></div>
        <div class="sv">${(()=>{const _avgs=staff.map(s=>staffAvg(s.id)).filter(x=>x>0);return _avgs.length?Math.round(_avgs.reduce((a,b)=>a+b,0)/_avgs.length*10)/10:'-'})()}</div>
        <div class="sl">Điểm TB toàn Ban</div>
      </div>
    </div>

    <div class="cd">
      <div class="ch">
        <h3><i class="fas fa-chart-bar" style="color:var(--purple)"></i> Tổng hợp tháng ${CM}</h3>
        <button class="btn btn-s btn-p" onclick="openEvalStaff()"><i class="fas fa-plus"></i> Đánh giá mới</button>
      </div>
      <div class="cb" style="padding:16px 20px">
        <div style="display:grid;grid-template-columns:1fr 300px;gap:20px;align-items:start">
          <div style="overflow-x:auto">
            <table style="width:100%;border-collapse:collapse">
              <thead>
                <tr>
                  <th style="text-align:left;padding:8px 10px;font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--t3);background:var(--inp);border-bottom:1px solid var(--brd);white-space:nowrap">Thành viên</th>
                  <th style="text-align:left;padding:8px 10px;font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--t3);background:var(--inp);border-bottom:1px solid var(--brd);white-space:nowrap">Vai trò</th>
                  ${EVAL_CRITERIA.map(cr=>`<th title="${cr.desc}" style="text-align:center;padding:8px 6px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;color:var(--t3);background:var(--inp);border-bottom:1px solid var(--brd);white-space:nowrap">${cr.short}</th>`).join('')}
                  <th style="text-align:center;padding:8px 10px;font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--t3);background:var(--inp);border-bottom:1px solid var(--brd);white-space:nowrap">TB</th>
                  <th style="text-align:center;padding:8px 10px;font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--t3);background:var(--inp);border-bottom:1px solid var(--brd);white-space:nowrap">XL</th>
                  <th style="text-align:center;padding:8px 10px;font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--t3);background:var(--inp);border-bottom:1px solid var(--brd);white-space:nowrap">Lượt</th>
                </tr>
              </thead>
              <tbody>
                ${staff.map(s=>{
                  const se=evals.filter(e=>e.staffId===s.id);
                  const avg=staffAvg(s.id);
                  const crAvgs=EVAL_CRITERIA.map(cr=>{if(!se.length)return '-';return (Math.round(se.reduce((sum,e)=>sum+(+(e.scores?.[cr.key]||0)),0)/se.length*10)/10)});
                  const rowBg=avg>=8?'rgba(5,150,105,.04)':avg>=6?'rgba(217,119,6,.04)':avg>0?'rgba(220,38,38,.04)':'';
                  const initials=s.name.split(' ').slice(-2).map(w=>w[0]).join('');
                  return `<tr style="background:${rowBg}">
                    <td style="padding:10px;border-bottom:1px solid var(--brd);vertical-align:middle">
                      <div style="display:flex;align-items:center;gap:8px">
                        <div style="width:30px;height:30px;border-radius:50%;background:linear-gradient(135deg,var(--ac),var(--purple));display:flex;align-items:center;justify-content:center;color:#fff;font-size:11px;font-weight:700;flex-shrink:0">${initials}</div>
                        <strong>${s.name}</strong>
                      </div>
                    </td>
                    <td style="padding:10px;border-bottom:1px solid var(--brd);color:var(--t3);font-size:13px">${s.role}</td>
                    ${crAvgs.map(v=>`<td style="text-align:center;padding:10px 6px;border-bottom:1px solid var(--brd);font-weight:700;font-size:14px;color:${v==='-'?'var(--t3)':v>=8?'var(--ok)':v>=6?'var(--wn)':'var(--ng)'}">${v}</td>`).join('')}
                    <td style="text-align:center;padding:10px;border-bottom:1px solid var(--brd)"><span style="font-size:18px;font-weight:800;color:${avg?kCol(avg*10):'var(--t3)'}"> ${avg||'-'}</span></td>
                    <td style="text-align:center;padding:10px;border-bottom:1px solid var(--brd)"><span class="badge ${avg?evalBadge(avg):'bl'}">${avg?evalLabel(avg):'—'}</span></td>
                    <td style="text-align:center;padding:10px;border-bottom:1px solid var(--brd);color:var(--t3)">${se.length}</td>
                  </tr>`;
                }).join('')}
              </tbody>
            </table>
          </div>
          <div style="background:var(--inp);border:1px solid var(--brd);border-radius:12px;padding:14px;position:sticky;top:80px">
            <div style="font-size:12px;font-weight:700;color:var(--t2);margin-bottom:2px;display:flex;align-items:center;gap:5px"><i class="fas fa-spider" style="color:var(--purple)"></i> Năng lực TB toàn Ban</div>
            <div style="font-size:11px;color:var(--t3);margin-bottom:10px">Điểm trung bình các tiêu chí — ${CM}</div>
            <canvas id="evalRadarChart" height="220"></canvas>
            <div style="margin-top:10px;border-top:1px solid var(--brd);padding-top:10px">
              ${EVAL_CRITERIA.map(cr=>{
                const _vals=evals.map(e=>+(e.scores?.[cr.key]||0)).filter(v=>v>0);
                const _avg=_vals.length?Math.round(_vals.reduce((a,b)=>a+b,0)/_vals.length*10)/10:0;
                return `<div style="margin-bottom:7px">
                  <div style="display:flex;justify-content:space-between;margin-bottom:3px">
                    <span style="font-size:11px;color:var(--t2)">${cr.short}</span>
                    <span style="font-size:11px;font-weight:700;color:${_avg>=8?'var(--ok)':_avg>=6?'var(--wn)':'var(--ng)'}">${_avg||'—'}</span>
                  </div>
                  <div class="pb"><div class="fl" style="width:${_avg/10*100}%;background:${_avg>=8?'var(--ok)':_avg>=6?'var(--wn)':'var(--ng)'}"></div></div>
                </div>`;
              }).join('')}
            </div>
          </div>
        </div>
      </div>
    </div>
    
    <div class="cd"><div class="ch"><h3><i class="fas fa-history" style="color:var(--cyan)"></i> Lịch sử đánh giá</h3></div>
    <div class="cb np">${allEvals.length?`<table><thead><tr><th>Ngày</th><th>Tháng</th><th>Thành viên</th>${EVAL_CRITERIA.map(cr=>`<th>${cr.short}</th>`).join('')}<th>TB</th><th>Người ĐG</th><th></th></tr></thead><tbody>
    ${allEvals.map(e=>{const sc=e.scores||{};const vals=EVAL_CRITERIA.map(cr=>+(sc[cr.key]||0));const avg=Math.round(vals.reduce((a,b)=>a+b,0)/vals.length*10)/10;
      return `<tr><td style="white-space:nowrap">${fD(e.date)||'-'}</td><td>${e.month}</td><td><strong>${e.staffName}</strong></td>
        ${EVAL_CRITERIA.map(cr=>`<td style="text-align:center;color:${(+(sc[cr.key]||0))>=8?'var(--ok)':(+(sc[cr.key]||0))>=6?'var(--wn)':'var(--ng)'}">${sc[cr.key]||0}</td>`).join('')}
        <td style="text-align:center"><strong>${avg}</strong></td><td style="color:var(--t3)">${e.evaluator||'-'}</td>
        <td><button class="btn btn-x btn-o" onclick="openEvalStaff('${e.id}')"><i class="fas fa-edit"></i></button> <button class="btn btn-x btn-ng" onclick="delEvalStaff('${e.id}')"><i class="fas fa-trash"></i></button></td></tr>`}).join('')}
    </tbody></table>`:'<div class="empty" style="padding:16px"><p>Chưa có lượt đánh giá nào</p></div>'}</div></div>`}</div>`
  // Vẽ Radar chart đánh giá thành viên
  setTimeout(()=>{
    const _ctx=document.getElementById('evalRadarChart');
    if(!_ctx)return;
    const _labels=EVAL_CRITERIA.map(cr=>cr.short);
    const _globalData=EVAL_CRITERIA.map(cr=>{
      const _vals=evals.map(e=>+(e.scores?.[cr.key]||0)).filter(v=>v>0);
      return _vals.length?Math.round(_vals.reduce((a,b)=>a+b,0)/_vals.length*10)/10:0;
    });
    const _colors=['#2563EB','#059669','#D97706','#DC2626','#7C3AED','#0891B2','#F59E0B'];
    const _datasets=[{
      label:'TB toàn Ban',
      data:_globalData,
      backgroundColor:'rgba(37,99,235,0.18)',
      borderColor:'#2563EB',
      borderWidth:2.5,
      pointBackgroundColor:'#2563EB',
      pointRadius:4,
      pointHoverRadius:6,
      fill:true
    }];
    staff.forEach((s,_i)=>{
      const _se=evals.filter(e=>e.staffId===s.id);
      if(!_se.length)return;
      const _sData=EVAL_CRITERIA.map(cr=>Math.round(_se.reduce((sum,e)=>sum+(+(e.scores?.[cr.key]||0)),0)/_se.length*10)/10);
      const _col=_colors[(_i+1)%_colors.length];
      _datasets.push({
        label:s.name.split(' ').pop(),
        data:_sData,
        backgroundColor:_col+'18',
        borderColor:_col,
        borderWidth:1.5,
        borderDash:[5,3],
        pointBackgroundColor:_col,
        pointRadius:3,
        pointHoverRadius:5,
        fill:false
      });
    });
    new Chart(_ctx,{
      type:'radar',
      data:{labels:_labels,datasets:_datasets},
      options:{
        responsive:true,
        scales:{r:{min:0,max:10,ticks:{stepSize:2,font:{size:9},color:'#94A3B8',backdropColor:'transparent'},
          grid:{color:'rgba(0,0,0,0.07)'},
          pointLabels:{font:{size:10,weight:'600'},color:'#475569'},
          angleLines:{color:'rgba(0,0,0,0.08)'}}},
        plugins:{
          legend:{position:'bottom',labels:{boxWidth:9,padding:8,font:{size:10}}},
          tooltip:{callbacks:{label:ctx=>`${ctx.dataset.label}: ${ctx.raw}/10`}}
        },
        animation:{duration:700,easing:'easeOutQuart'}
      }
    });
  },100);}

function openEvalStaff(eid){
  const e=eid?D.efb.staffEvals.find(x=>x.id===eid):null;
  const staff=D.efb.staff||[];
  document.getElementById('MT').textContent=e?'Sửa đánh giá thành viên':'Đánh giá thành viên Ban hiệu quả';

function manualBackupDL(){
  const blob=new Blob([JSON.stringify(D,null,2)],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);
  a.download='KPI_Backup_'+CM+'_'+Date.now()+'.json';
  document.body.appendChild(a);a.click();document.body.removeChild(a);
  toast('✅ Đã tải backup!','ok');
}
function importBackupFile(){
  const inp=document.createElement('input');inp.type='file';inp.accept='.json';
  inp.onchange=function(e){
    const file=e.target.files[0];if(!file)return;
    const reader=new FileReader();
    reader.onload=function(ev){
      try{
        const d=JSON.parse(ev.target.result);
        if(!d.members){toast('❌ File không hợp lệ!','ng');return;}
        confirmModal('Khôi phục sẽ ghi đè dữ liệu hiện tại. Tiếp tục?',function(){
          localStorage.setItem(SK,JSON.stringify(d));location.reload();
        });
      }catch(e2){toast('❌ Lỗi: '+e2.message,'ng');}
    };
    reader.readAsText(file);
  };
  inp.click();
}
function restoreAutoBackup(idx){
  const backups=JSON.parse(localStorage.getItem('kpiAutoBackup')||'[]');
  if(!backups[idx])return;
  confirmModal('Khôi phục bản backup ngày '+new Date(backups[idx].date).toLocaleString('vi-VN')+'?',function(){
    localStorage.setItem(SK,backups[idx].data);location.reload();
  });
}

function exportData(){
  const dataStr=JSON.stringify(D,null,2);
  const blob=new Blob([dataStr],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  const now=new Date();
  const ts=now.getFullYear()+String(now.getMonth()+1).padStart(2,'0')+String(now.getDate()).padStart(2,'0')+'_'+String(now.getHours()).padStart(2,'0')+String(now.getMinutes()).padStart(2,'0');
  a.href=url;a.download='KPI_backup_'+ts+'.json';document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(url);
  toast('Đã tải file sao lưu','ok')}

function importData(input){
  const file=input.files[0];if(!file)return;
  if(!file.name.endsWith('.json')){toast('Chỉ chấp nhận file .json','ng');input.value='';return}
  const reader=new FileReader();
  reader.onload=function(e){
    try{
      const imported=JSON.parse(e.target.result);
      // Validate basic structure
      if(!imported.members||!Array.isArray(imported.members)){toast('File không hợp lệ: thiếu danh sách thành viên','ng');return}
      if(!imported.units||!Array.isArray(imported.units)){toast('File không hợp lệ: thiếu danh sách đơn vị','ng');return}
      if(!confirm('Bạn có chắc muốn khôi phục dữ liệu từ file này?\n\nToàn bộ dữ liệu hiện tại sẽ bị GHI ĐÈ!'))return;
      D=imported;
      // Ensure sub-structures exist
      if(!D.kpi)D.kpi={};
      if(!D.eval)D.eval={bank:[],unitBank:{},monthSetup:{},scores:[],reports:[]};
      if(!D.eval.unitBank)D.eval.unitBank={};
      if(!D.efb)D.efb={staff:[],assignments:[],minutes:[],staffEvals:[]};
      if(!D.efb.staffEvals)D.efb.staffEvals=[];
      if(!D.memberReports)D.memberReports=[];
      sv();
      toast('Khôi phục thành công! Đang tải lại...','ok');
      setTimeout(()=>R(),500);
    }catch(err){toast('Lỗi đọc file: '+err.message,'ng')}
  };
  reader.readAsText(file);input.value=''}

  const events={};for(let d=1;d<=dim;d++)events[d]=[];
  (D.efb.assignments||[]).forEach(a=>{
    if(filterUid&&a.unitId!==filterUid)return;
    const unitName=D.units.find(u=>u.id===a.unitId)?.name||'';
    const staffNames=(a.staffIds||[]).map(sid=>{const s=D.efb.staff.find(x=>x.id===sid);return s?s.name:'?'}).join(', ');
    let hasDateTask=false;
    (a.tasks||[]).forEach(t=>{
      if(t.date){const dd=parseInt(t.date.split('-')[2]);const mm=t.date.substring(0,7);
        if(mm===CM&&dd>=1&&dd<=dim){hasDateTask=true;events[dd].push({type:'task',unit:unitName,unitId:a.unitId,text:t.name,person:(t.persons&&t.persons.length?t.persons.join(', '):t.person||''),persons:t.persons||[],done:t.done,assignTitle:a.title})}}});
    if(!hasDateTask&&a.period){
      let targetDay=1;const wMatch=a.period.match(/W(\d+)/i);
      if(wMatch){targetDay=Math.min(dim,Math.max(1,(parseInt(wMatch[1])-1)*7+1))}
      const pMonth=a.period.match(/T(\d+)/i);const pYear=a.period.match(/^(\d{4})/);
      if((!pYear||parseInt(pYear[1])===yr)&&(!pMonth||parseInt(pMonth[1])===mo)){
        events[targetDay].push({type:'assign',unit:unitName,unitId:a.unitId,text:a.title,person:staffNames,done:false})}}
    else if(hasDateTask){
      const firstDate=(a.tasks||[]).filter(t=>t.date?.startsWith(CM)).map(t=>parseInt(t.date.split('-')[2])).sort((a,b)=>a-b)[0];
      if(firstDate&&firstDate>=1&&firstDate<=dim){
        const existing=events[firstDate].find(e=>e.type==='assign'&&e.text===a.title);
        if(!existing)events[firstDate].push({type:'assign',unit:unitName,unitId:a.unitId,text:'📋 '+a.title,person:staffNames,done:false})}}
  });
  (D.efb.minutes||[]).forEach(m=>{if(filterUid&&m.unitId!==filterUid)return;if(m.date){const dd=parseInt(m.date.split('-')[2]);const mm=m.date.substring(0,7);
    if(mm===CM&&dd>=1&&dd<=dim)events[dd].push({type:m.type==='meeting'?'meet':'work',unit:D.units.find(u=>u.id===m.unitId)?.name||'',unitId:m.unitId,text:m.title,chairPerson:m.chairPerson,attendees:m.attendees})}});
  (D.eval.scores||[]).forEach(e=>{if(filterUid&&e.unitId!==filterUid)return;if(e.date){const dd=parseInt(e.date.split('-')[2]);const mm=e.date.substring(0,7);
    if(mm===CM&&dd>=1&&dd<=dim)events[dd].push({type:'eval',unit:e.unitName||'',unitId:e.unitId,text:`Đánh giá: ${e.total}/${e.maxS}`,result:e.result})}});
  return {events,dim}}

function _buildCalGrid(events,dim,yr,mo,showUnit){
  const typeColors={task:'var(--ac)',meet:'var(--purple)',work:'var(--cyan)',eval:'var(--wn)',assign:'var(--ok)'};
  const typeLabels={task:'Công việc',meet:'Họp ĐV',work:'LV với ĐV',eval:'Đánh giá',assign:'Phân công'};
  const firstDay=(new Date(yr,mo-1,1).getDay()+6)%7;const todayD=today();
  const dayNames=['T2','T3','T4','T5','T6','T7','CN'];
  let h='';
  h+=dayNames.map(d=>`<div style="text-align:center;font-size:12px;font-weight:700;color:var(--t3);padding:8px">${d}</div>`).join('');
  for(let i=0;i<firstDay;i++)h+=`<div style="background:var(--bg);border-radius:6px"></div>`;
  for(let d=1;d<=dim;d++){
    const isToday=d===todayD;const evts=events[d];
    const maxShow=showUnit?5:3;
    h+=`<div style="background:${isToday?'var(--acg)':'var(--card)'};border:1px solid ${isToday?'var(--ac)':'var(--brd)'};border-radius:8px;padding:6px;min-height:${showUnit?'90':'80'}px;overflow:hidden">
      <div style="font-size:13px;font-weight:${isToday?'800':'600'};color:${isToday?'var(--ac)':'var(--t1)'};margin-bottom:4px">${d}${evts.length?` <span style="font-size:10px;font-weight:400;color:var(--t3)">(${evts.length})</span>`:''}</div>
      ${evts.slice(0,maxShow).map(ev=>`<div style="font-size:10px;padding:2px 5px;margin-bottom:2px;border-radius:3px;background:${typeColors[ev.type]}15;border-left:2px solid ${typeColors[ev.type]};white-space:nowrap;overflow:hidden;text-overflow:ellipsis;cursor:pointer" title="${ev.text}${showUnit?'':(ev.unit?' — '+ev.unit:'')}${(ev.persons&&ev.persons.length?ev.persons.join(', '):ev.person)?' · '+(ev.persons&&ev.persons.length?ev.persons.join(', '):ev.person):''}">
        <strong style="color:${typeColors[ev.type]}">${typeLabels[ev.type]}</strong> ${ev.text.substring(0,25)}</div>`).join('')}
      ${evts.length>maxShow?`<div style="font-size:9px;color:var(--t3);text-align:center">+${evts.length-maxShow} khác</div>`:''}
    </div>`}
  return h}

function fbSaveCfg(){
  var url=document.getElementById('fbUrl').value.trim();
  var path=document.getElementById('fbPath').value.trim()||'/kpi_data';
  try{localStorage.setItem('kpi_fb_cfg',JSON.stringify({url:url,path:path}))}catch(e){}
  toast(url?'Đã lưu cấu hình':'Đã xóa cấu hình','ok');R()}

function fbGetCfg(){try{return JSON.parse(localStorage.getItem('kpi_fb_cfg'))||{}}catch(e){return {}}}

var _fbUnsubscribe=null,_fbRealtime=false,_fbApp=null;

function fbPush(){
  var cfg=fbGetCfg();
  if(!cfg.url){toast('Chưa có Firebase URL','ng');return}
  var url=cfg.url.replace(/\/$/,'')+cfg.path+'.json';
  var log=document.getElementById('fbLog');
  log.innerHTML='<div class="cd"><div class="cb" style="color:var(--t2)"><i class="fas fa-spinner fa-spin"></i> Đang đẩy...</div></div>';
  fetch(url,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify(D)})
  .then(function(r){if(!r.ok)throw new Error('HTTP '+r.status);return r.json()})
  .then(function(){
    log.innerHTML='<div class="cd"><div class="cb" style="color:var(--ok)"><i class="fas fa-check-circle"></i> Đẩy lên thành công!</div></div>';
    toast('Đẩy lên thành công!','ok');
  })
  .catch(function(e){
    log.innerHTML='<div class="cd"><div class="cb" style="color:var(--ng)">Lỗi: '+e.message+'</div></div>';
    toast('Lỗi: '+e.message,'ng');
  });
}

function fbToggleRealtime(){
  if(_fbRealtime){fbStopRealtime();return;}
  var cfg=fbGetCfg();
  if(!cfg.url){toast('Chưa có Firebase URL','ng');return;}
  if(!window._fbSDK){toast('Firebase SDK chưa tải, vui lòng chờ hoặc kiểm tra kết nối mạng','ng');return;}
  var initializeApp=window._fbSDK.initializeApp,getDatabase=window._fbSDK.getDatabase,ref=window._fbSDK.ref,onValue=window._fbSDK.onValue;
  try{
    if(!_fbApp){
      try{_fbApp=initializeApp({databaseURL:cfg.url},'kpi-rt-app');}
      catch(ex){
        var apps=window.firebase&&window.firebase.apps;
        _fbApp=apps&&apps.length?apps[0]:initializeApp({databaseURL:cfg.url});
      }
    }
    var db=getDatabase(_fbApp);
    var basePath=(cfg.path||'/kpi_data').replace(/\/$/,'');
    if(!basePath.startsWith('/'))basePath='/'+basePath;
    var log=document.getElementById('fbLog');
    window._fbCfg=cfg; window._fbBasePath=basePath; window._fbDb=db;

    // === PHƯƠNG ÁN SESSION SYNC ===
    // KHÔNG dùng onValue realtime — tránh nhảy UI liên tục
    // Chỉ sync khi: (1) bấm nút thủ công, (2) đóng tab, (3) poll 30s kiểm tra _meta

    // Hàm push toàn bộ lên Firebase (gọi khi người dùng chủ động)
    window._fbPushNow=function(silent){
      if(!window._fbRealtime||!window._fbSDK||!window._fbApp)return;
      try{
        D._lastModified=Date.now();
        D._modifiedBy=U?U.id:null;
        window._localWriteTS=D._lastModified;
        localStorage.setItem(SK,JSON.stringify(D));
        var _db=window._fbSDK.getDatabase(window._fbApp);
        // [T1-F4] update() từng path riêng thay vì set() toàn bộ → tránh 2 user ghi đè nhau
        var _upd={};
        _upd[basePath+'/kpi']=D.kpi||{};
        _upd[basePath+'/eval']=D.eval||{};
        _upd[basePath+'/efb']=D.efb||{};
        _upd[basePath+'/memberReports']=D.memberReports||[];
        _upd[basePath+'/contacts']=D.contacts||{};
        _upd[basePath+'/members']=D.members||[];
        _upd[basePath+'/_lastModified']=D._lastModified||Date.now();
        _upd[basePath+'/_modifiedBy']=D._modifiedBy||null;
        _upd[basePath+'/_meta']={lastModified:D._lastModified,modifiedBy:D._modifiedBy,modifiedUnit:'all'};
        window._fbSDK.update(window._fbSDK.ref(_db,'/'),_upd)
          .then(function(){return Promise.resolve();})
          .then(function(){
            // [FIX-1] CHỈ tắt badge sau khi push THÀNH CÔNG
            window._fbPushRetry=0;
            window._hasLocalChange=false;
            var btn=document.getElementById('btnSyncNow');
            if(btn){btn.classList.remove('has-change');btn.title='Đã đồng bộ';}
            if(!silent){
              if(log)log.innerHTML='<div class="cd"><div class="cb" style="color:var(--ok)"><i class="fas fa-check-circle"></i> Đã lưu & đồng bộ lúc <strong>'+new Date().toLocaleTimeString('vi-VN')+'</strong></div></div>';
              toast('✓ Đã lưu & đồng bộ thành công!','ok');
            }
          })
          .catch(function(e){
            // [FIX-1] Lỗi: badge VẪN sáng, tự retry tối đa 3 lần
            window._fbPushRetry=(window._fbPushRetry||0)+1;
            if(window._fbPushRetry<=3){
              var delay=window._fbPushRetry*8000;
              if(!silent)toast('⚠ Lỗi đồng bộ, thử lại lần '+window._fbPushRetry+' sau '+(delay/1000)+'s...','wn');
              clearTimeout(window._fbPushRetryTimer);
              window._fbPushRetryTimer=setTimeout(function(){window.fbPushNow(silent);},delay);
            }else{
              window._fbPushRetry=0;
              if(!silent)toast('✗ Không thể đồng bộ sau 3 lần. Dữ liệu vẫn lưu local an toàn.','ng');
              startPolling();
            }
          });
      }catch(e){
        if(!silent)toast('Lỗi push: '+e.message,'ng');
        startPolling();
      }
    };

    // Hàm fetch data từ Firebase về (poll)
    function fetchFromFirebase(onDone){
      // [T1-F3] Timeout 10s - tránh fetch treo vô hạn
      var _ctrl=new AbortController();
      var _ftimer=setTimeout(function(){_ctrl.abort();if(onDone)onDone(false);toast('⏱ Firebase timeout 10s','wn');},10000);
      fetch(cfg.url+(basePath.startsWith('/')?basePath:'/'+basePath)+'.json',{signal:_ctrl.signal})
        .then(function(r){clearTimeout(_ftimer);return r.json();})
        .then(function(data){
          if(!data||!data.members){if(onDone)onDone(false);return;}
          var remoteTime=data._lastModified||0;
          var localTime=D._lastModified||0;
          if(remoteTime<=localTime){if(onDone)onDone(false);return;}
          // Merge smart
          if(data.kpi){
            if(!D.kpi)D.kpi={};
            Object.keys(data.kpi).forEach(function(month){
              if(!D.kpi[month])D.kpi[month]={};
              if(data.kpi[month])Object.keys(data.kpi[month]).forEach(function(uid){
                D.kpi[month][uid]=data.kpi[month][uid];
              });
            });
          }
          if(data.eval)D.eval=data.eval;
          if(data.efb)D.efb=data.efb;
          if(data.memberReports)D.memberReports=data.memberReports;
          if(data.members)D.members=data.members;
          if(data.contacts)D.contacts=data.contacts;
          if(!D.kpi)D.kpi={};
          if(!D.eval)D.eval={bank:[],unitBank:{},monthSetup:{},scores:[],reports:[]};
          if(!D.efb)D.efb={staff:[],assignments:[],minutes:[],staffEvals:[]};
          if(!D.memberReports)D.memberReports=[];
          D._lastModified=remoteTime;
          D._modifiedBy=data._modifiedBy;
          localStorage.setItem(SK,JSON.stringify(D));
          R();
          if(log)log.innerHTML='<div class="cd"><div class="cb" style="color:var(--ok)"><i class="fas fa-sync"></i> Nhận cập nhật lúc <strong>'+new Date().toLocaleTimeString('vi-VN')+'</strong></div></div>';
          if(onDone)onDone(true);
        }).catch(function(){if(onDone)onDone(false);});
    }

    // Polling nhẹ: mỗi 30s chỉ fetch /_meta (vài bytes) để kiểm tra có thay đổi không
    window._pollLastTime=Date.now();
    function startPolling(){
      if(window._pollTimer)clearInterval(window._pollTimer);
      if(window._pollWatchdog)clearInterval(window._pollWatchdog);
      window._pollLastTime=Date.now();
      window._pollTimer=setInterval(function(){
        window._pollLastTime=Date.now(); // [FIX-3] heartbeat
        fetch(cfg.url+(basePath.startsWith('/')?basePath:'/'+basePath)+'/_meta.json')
          .then(function(r){return r.json();})
          .then(function(meta){
            if(!meta)return;
            var remoteTime=meta.lastModified||0;
            var myLastWrite=window._localWriteTS||0;
            // [FIX-3] Anti-conflict: 30s cho admin/tgd/ptgd, 10s cho user thường
            var acWindow=(U&&(U.role==='admin'||U.role==='tgd'||U.role==='ptgd'))?30000:10000;
            if(meta.modifiedBy===(U?U.id:null)&&(Date.now()-myLastWrite)<acWindow)return;
            // Bỏ qua nếu không mới hơn
            if(remoteTime<=(D._lastModified||0))return;
            // Có thay đổi thật từ người khác → fetch full
            fetchFromFirebase(function(updated){
              if(updated)toast('Dữ liệu vừa được cập nhật từ người dùng khác','bl');
            });
          }).catch(function(){});
      },30000); // 30 giây poll 1 lần
      // [FIX-3] Watchdog: mỗi 2 phút kiểm tra polling còn sống không
      window._pollWatchdog=setInterval(function(){
        if(window._fbRealtime&&(Date.now()-window._pollLastTime)>180000){
          startPolling();
          toast('🔄 Realtime tự kích hoạt lại (watchdog)','bl');
        }
      },120000);
    }

    // === CƠ CHẾ 1: beforeunload — đóng tab bình thường / F5 / đóng trình duyệt ===
    window.addEventListener('beforeunload',function(e){
      if(window._hasLocalChange&&window._fbRealtime){
        window._fbPushNow(true);
        // Hiện cảnh báo nếu đang có dữ liệu chưa sync (tuỳ trình duyệt có hỗ trợ không)
        e.preventDefault();
        e.returnValue='Bạn có dữ liệu chưa đồng bộ. Vui lòng đợi giây lát...';
      }
    });

    // === CƠ CHẾ 2: visibilitychange — chuyển tab, thu nhỏ cửa sổ ===
    // Khi người dùng rời tab (tab bị ẩn) → push ngay nếu có thay đổi
    document.addEventListener('visibilitychange',function(){
      if(document.visibilityState==='hidden'){
        // Tab bị ẩn (chuyển sang tab khác, thu nhỏ, khóa màn hình)
        if(window._hasLocalChange&&window._fbRealtime){
          window._fbPushNow(true); // push ngay lập tức
        }
      } else if(document.visibilityState==='visible'){
        // Tab được mở lại → kiểm tra xem có data mới từ người khác không
        if(window._fbRealtime){
          // [FIX-4] Polling có thể đã chết khi máy ngủ/tắt → tự restart
          if((Date.now()-(window._pollLastTime||0))>60000){
            startPolling();
            toast('🔄 Realtime đã tự kích hoạt lại','bl');
          }
          setTimeout(function(){
            fetch(cfg.url+(basePath.startsWith('/')?basePath:'/'+basePath)+'/_meta.json')
              .then(function(r){return r.json();})
              .then(function(meta){
                if(!meta)return;
                var remoteTime=meta.lastModified||0;
                var myLastWrite=window._localWriteTS||0;
                if(meta.modifiedBy===(U?U.id:null)&&(Date.now()-myLastWrite)<10000)return;
                if(remoteTime<=(D._lastModified||0))return;
                // Có data mới → fetch ngay không chờ poll 30s
                fetchFromFirebase(function(updated){
                  if(updated)toast('Đã cập nhật dữ liệu mới khi bạn quay lại','bl');
                });
              }).catch(function(){});
          },500); // delay 500ms để trang ổn định
        }
      }
    });

    // === CƠ CHẾ 3: Auto-push sau 3 phút không hoạt động (idle) ===
    // Nếu người dùng ngừng thao tác 3 phút mà chưa bấm 💾 → tự push
    var _idleTimer=null;
    function resetIdleTimer(){
      clearTimeout(_idleTimer);
      if(window._hasLocalChange&&window._fbRealtime){
        _idleTimer=setTimeout(function(){
          window.fbPushNow(true); // [FIX-2] badge chỉ tắt trong .then() của fbPushNow
          toast('⏱ Tự động lưu đồng bộ sau 3 phút không hoạt động','bl');
        },180000); // 3 phút
      }
    }
    // Lắng nghe mọi thao tác của người dùng để reset idle timer
    ['mousemove','keydown','click','scroll','touchstart'].forEach(function(evt){
      document.addEventListener(evt, resetIdleTimer, {passive:true});
    });

    // Bắt đầu polling
    startPolling();
    if(log)log.innerHTML='<div class="cd"><div class="cb" style="color:var(--ok)"><i class="fas fa-wifi"></i> <strong>Đồng bộ đã bật</strong> — tự kiểm tra mỗi 30 giây. Bấm 💾 để lưu ngay.</div></div>';
    toast('Đã bật đồng bộ! Bấm 💾 để lưu ngay.','ok');
    _fbRealtime=true;
    localStorage.setItem('kpiFbRealtimeOn','1'); // [FIX-6]
    var btn=document.getElementById('btnRealtime');
    if(btn){btn.innerHTML='<i class="fas fa-stop-circle"></i> Dừng Realtime';btn.className='btn btn-s btn-ng';}
  }catch(e){toast('Lỗi Firebase: '+e.message,'ng');}
}

function openGlobalSearch(){

window._gsItems=[];
function gsRender(q){
  var el=document.getElementById('gsResults');if(!el)return;
  if(!q){el.innerHTML='<div class="gs-empty">Nhập từ khóa để tìm kiếm...</div>';return;}
  var results=[];
  // Thành viên
  (D.members||[]).forEach(function(m){
    if(m.name.toLowerCase().indexOf(q)>=0||m.username.toLowerCase().indexOf(q)>=0)
      results.push({type:'Thành viên',icon:'fa-user',title:m.name,sub:m.position||'',action:function(){nav('amem');}});
  });
  // KPI shared + personal
  Object.keys(D.kpi||{}).forEach(function(mo){
    Object.keys(D.kpi[mo]||{}).forEach(function(uid){
      var ud=D.kpi[mo][uid];
      (ud.shared||[]).forEach(function(sk){
        if(sk.name&&sk.name.toLowerCase().indexOf(q)>=0)
          results.push({type:'KPI Chung',icon:'fa-bullseye',title:sk.name,sub:'T'+mo,action:function(){CM=mo;nav('krep');}});
      });
      Object.values(ud.personal||{}).forEach(function(arr){
        (arr||[]).forEach(function(k){
          if(k.name&&k.name.toLowerCase().indexOf(q)>=0)
            results.push({type:'KPI Cá nhân',icon:'fa-user-check',title:k.name,sub:'T'+mo,action:function(){CM=mo;nav('mykpi');}});
        });
      });
    });
  });
  // Biên bản
  (D.efb&&D.efb.minutes||[]).forEach(function(m){
    if((m.title||'').toLowerCase().indexOf(q)>=0||(m.summary||'').toLowerCase().indexOf(q)>=0)
      results.push({type:'Biên bản',icon:'fa-file-alt',title:m.title||'',sub:m.date||'',action:function(){nav('emin');}});
  });
  // Báo cáo thành viên
  (D.memberReports||[]).forEach(function(r){
    if((r.title||'').toLowerCase().indexOf(q)>=0||(r.content||'').toLowerCase().indexOf(q)>=0)
      results.push({type:'Báo cáo',icon:'fa-file-signature',title:r.title||'',sub:r.fromName||'',action:function(){nav('mreport');}});
  });
  // Phân công
  (D.efb&&D.efb.assignments||[]).forEach(function(a){
    if((a.title||'').toLowerCase().indexOf(q)>=0)
      results.push({type:'Phân công',icon:'fa-tasks',title:a.title||'',sub:'',action:function(){nav('eassign');}});
  });
  if(!results.length){el.innerHTML='<div class="gs-empty">Không tìm thấy kết quả cho "<strong>'+esc(q)+'</strong>"</div>';return;}
  window._gsItems=results;
  var sliced=results.slice(0,20);
  el.innerHTML=sliced.map(function(r,i){
    return '<div class="gs-item" onclick="window._gsItems['+i+'].action();document.getElementById(\'globalSearchBox\').remove()">'
      +'<i class="fas '+r.icon+'" style="color:var(--ac);width:16px;text-align:center"></i>'
      +'<span class="gs-title">'+esc(r.title)+'</span>'
      +'<span class="gs-sub">'+esc(r.sub)+'</span>'
      +'<span class="gs-type">'+r.type+'</span>'
      +'</div>';
  }).join('');
}

function autoBackupCheck(force){
  try{
    var last=parseInt(localStorage.getItem(AB_TS)||0);
    if(!force&&Date.now()-last<86400000)return;
    var backups=JSON.parse(localStorage.getItem(AB_KEY)||'[]');
    backups.unshift({date:new Date().toISOString(),data:JSON.stringify(D)});
    if(backups.length>7)backups.splice(7);
    localStorage.setItem(AB_KEY,JSON.stringify(backups));
    localStorage.setItem(AB_TS,String(Date.now()));
    if(force)toast('💾 Auto backup đã lưu!','ok');
  }catch(e){if(force)toast('❌ Backup thất bại: '+e.message,'ng');}
}

// =============================================
// W3-F5: Deadline Reminder
// =============================================
function checkDeadlineReminders(){
  if(!U)return;
  var today=new Date();today.setHours(0,0,0,0);
  var soon=new Date(today);soon.setDate(soon.getDate()+3);
  var overdue=[],upcoming=[];
  function checkDate(name,dateStr,from){
    if(!dateStr)return;
    var d=new Date(dateStr);d.setHours(0,0,0,0);
    if(d<today)overdue.push({name:name,date:dateStr,from:from});
    else if(d<=soon)upcoming.push({name:name,date:dateStr,from:from});
  }
  // KPI tasks
  Object.keys(D.kpi||{}).forEach(function(mo){
    Object.keys(D.kpi[mo]||{}).forEach(function(uid){
      var ud=D.kpi[mo][uid];
      Object.values(ud.tasks||{}).forEach(function(arr){
        (arr||[]).forEach(function(t){if(!t.done)checkDate(t.name,t.deadline,'KPI Task');});
      });
    });
  });
  // Phân công tasks
  (D.efb&&D.efb.assignments||[]).forEach(function(a){
    (a.tasks||[]).forEach(function(t){if(!t.done)checkDate(t.name,t.date,a.title);});
  });
  if(!overdue.length&&!upcoming.length)return;
  var tc=document.getElementById('TC');if(!tc)return;
  var div=document.createElement('div');
  div.className='toast wn';
  div.style.cssText='cursor:pointer;min-width:300px;max-width:400px';
  div.innerHTML='<i class="fas fa-bell" style="color:var(--wn);font-size:18px"></i>'
    +'<div style="flex:1">'
    +(overdue.length?'<div><strong style="color:var(--ng)">⚠️ '+overdue.length+' task đã quá hạn!</strong></div>':'')
    +(upcoming.length?'<div><strong style="color:var(--wn)">🕐 '+upcoming.length+' task sắp đến hạn</strong></div>':'')
    +'<div style="font-size:12px;color:var(--t3);margin-top:2px">Click để xem chi tiết</div>'
    +'</div>';
  div.onclick=function(){showDeadlineDetail(overdue,upcoming);div.remove();};
  tc.appendChild(div);
  setTimeout(function(){if(div.parentNode)div.remove();},12000);
}
function showDeadlineDetail(overdue,upcoming){
  document.getElementById('MT').textContent='⏰ Nhắc nhở Deadline';
  var html='';
  if(overdue.length){
    html+='<div style="margin-bottom:14px"><h4 style="color:var(--ng);margin-bottom:8px"><i class="fas fa-exclamation-circle"></i> Quá hạn ('+overdue.length+')</h4>'
      +overdue.map(function(t){return '<div style="padding:8px 12px;background:var(--ngb);border-radius:6px;margin-bottom:6px"><strong>'+esc(t.name||'')+'</strong><br><span style="color:var(--t3);font-size:12px">'+esc(t.from)+' — '+t.date+'</span></div>';}).join('')+'</div>';
  }
  if(upcoming.length){
    html+='<div><h4 style="color:var(--wn);margin-bottom:8px"><i class="fas fa-clock"></i> Sắp đến hạn ('+upcoming.length+')</h4>'
      +upcoming.map(function(t){return '<div style="padding:8px 12px;background:var(--wnb);border-radius:6px;margin-bottom:6px"><strong>'+esc(t.name||'')+'</strong><br><span style="color:var(--t3);font-size:12px">'+esc(t.from)+' — '+t.date+'</span></div>';}).join('')+'</div>';
  }
  document.getElementById('MB').innerHTML=html;
  document.getElementById('MF').innerHTML='<button class="btn btn-s btn-o" onclick="cM()">Đóng</button>';
  document.getElementById('MO').classList.add('on');
}
